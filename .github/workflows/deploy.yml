name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  AZURE_WEBAPP_NAME: bccconnect-web-CHANGE_ME

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        env:
          DATABASE_URL: 'file:./prisma/build.db'
          AUTH_SECRET: 'build-only-not-a-real-secret'
        run: npm run build

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Package
        run: |
          tar -czf release.tar.gz \
            .next \
            public \
            prisma \
            node_modules \
            package.json \
            package-lock.json \
            next.config.ts

      - uses: actions/upload-artifact@v4
        with:
          name: release
          path: release.tar.gz
          retention-days: 7

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release

      - name: Extract
        run: tar -xzf release.tar.gz

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.AZURE_DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .

      - name: Smoke test
        run: |
          for i in {1..30}; do
            if curl -sf https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health > /tmp/h.json; then
              echo "Healthy:"; cat /tmp/h.json; exit 0
            fi
            sleep 5
          done
          echo "Health check failed"; exit 1
