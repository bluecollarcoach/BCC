name: Event reminders (push)

# Fires Web Push reminders for sessions/events that are 24h or 15min out.
# The endpoint is idempotent (server-side de-dupe), so overlapping runs are
# harmless. GitHub cron is best-effort and can lag a few minutes; every 10
# minutes comfortably covers the 15-minute reminder window.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}   # allow manual "Run workflow" for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder scan
        run: |
          code=$(curl -sS -o /tmp/out.json -w '%{http_code}' \
            -X POST 'https://ambitious-forest-05235d41e.7.azurestaticapps.net/api/cron/reminders' \
            -H "x-bcc-cron-secret: ${{ secrets.CRON_SECRET }}")
          echo "HTTP $code"
          cat /tmp/out.json || true
          test "$code" = "200"
