<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#1a1a1a" />
<meta name="robots" content="noindex, nofollow" />
<title>Knowledge Base · BCC Connect</title>
<link rel="icon" type="image/png" href="bcc-logo.png" />
<link rel="manifest" href="manifest.json" />
<style>
  :root {
    --ink:#1a1a1a; --ink-line:#2e2c27;
    --gold:#c5a55a; --gold-warm:#d4b67a; --gold-deep:#a8884a; --gold-fade:rgba(197,165,90,0.12);
    --chrome:#f6f6f4; --chrome-mute:#e6e5e1; --muted:#6b7077;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Inter', system-ui, sans-serif; color:var(--ink); background:var(--chrome); }
  header.topbar {
    display:flex; align-items:center; gap:14px; padding:12px 22px; color:var(--chrome);
    background:linear-gradient(90deg, #141414, #1f1f1f);
    border-bottom:1px solid var(--ink-line); position:sticky; top:0; z-index:50;
  }
  header.topbar a.home { display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--chrome); }
  header.topbar img { height:30px; }
  header.topbar .wordmark { font-family:'Source Serif 4', Georgia, serif; font-size:14px; font-weight:700; letter-spacing:1.5px; }
  header.topbar .wordmark .light { color:var(--gold); }
  header.topbar .module {
    font-size:11px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--gold-warm);
    border-left:1px solid rgba(255,255,255,0.18); padding-left:14px; margin-left:4px;
  }
  .page { max-width:1100px; margin:0 auto; padding:22px 22px 70px; }
  .page-head { display:flex; align-items:flex-end; justify-content:space-between; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
  .page-head h1 { font-family:'Source Serif 4', Georgia, serif; font-size:26px; margin:0; }
  .page-head .sub { color:var(--muted); font-size:13px; margin-top:4px; }
  .btn { min-height:38px; border:0; border-radius:8px; padding:0 14px; font:inherit; font-weight:700; font-size:13px; cursor:pointer; }
  .btn-primary { background:var(--gold); color:#fff; }
  .btn-primary:hover { background:var(--gold-deep); }
  .btn-ghost { background:transparent; color:var(--ink); border:1px solid var(--chrome-mute); }
  .btn-ghost:hover { background:var(--chrome-mute); }
  .btn-danger { background:transparent; color:#6a1c1c; border:1px solid #e6c8c8; }
  .btn-danger:hover { background:#f3e0e0; }

  .toolbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    background:#fff; padding:12px; border:1px solid var(--chrome-mute); border-radius:12px; margin-bottom:14px; }
  .toolbar .search { flex:1; min-width:200px; display:flex; align-items:center; gap:8px;
    background:var(--chrome); border:1px solid var(--chrome-mute); border-radius:8px;
    padding:8px 12px; min-height:38px; }
  .toolbar .search input { flex:1; border:none; outline:none; background:transparent; font:inherit; font-size:14px; min-width:0; }
  .toolbar select { background:var(--chrome); border:1px solid var(--chrome-mute); border-radius:8px; padding:8px 10px; font:inherit; font-size:13px; min-height:38px; min-width:130px; }

  /* List + reader split */
  .split { display:grid; grid-template-columns:340px 1fr; gap:14px; }
  @media (max-width:900px) { .split { grid-template-columns:1fr; } }
  .list { background:#fff; border:1px solid var(--chrome-mute); border-radius:12px; overflow:hidden; max-height:80vh; overflow-y:auto; }
  .list .item {
    display:block; padding:12px 14px; border-bottom:1px solid var(--chrome-mute); text-decoration:none; color:var(--ink); cursor:pointer;
  }
  .list .item:last-child { border-bottom:none; }
  .list .item:hover { background:var(--gold-fade); }
  .list .item.active { background:var(--gold-fade); border-left:3px solid var(--gold); padding-left:11px; }
  .list .item .title { font-weight:700; font-size:13.5px; }
  .list .item .meta  { font-size:11.5px; color:var(--muted); margin-top:3px; display:flex; gap:8px; flex-wrap:wrap; }
  .tag { display:inline-block; background:var(--gold-fade); color:var(--gold-deep); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; padding:2px 7px; border-radius:999px; }
  .empty { padding:48px 20px; text-align:center; color:var(--muted); }
  .empty .big { font-family:'Source Serif 4', Georgia, serif; font-size:18px; color:var(--ink); margin-bottom:6px; }

  .reader {
    background:#fff; border:1px solid var(--chrome-mute); border-radius:12px;
    padding:22px 26px; min-height:60vh;
  }
  .reader h2 { font-family:'Source Serif 4', Georgia, serif; font-size:22px; margin:0 0 6px; }
  .reader .meta { color:var(--muted); font-size:12.5px; margin-bottom:14px; display:flex; gap:10px; flex-wrap:wrap; }
  .reader .meta .tags { display:flex; gap:5px; flex-wrap:wrap; }
  .reader .head-actions { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap; margin-bottom:6px; }
  .reader .body {
    font-size:14px; line-height:1.7; color:var(--ink);
    white-space:pre-wrap; word-wrap:break-word;
  }
  .reader .body h1, .reader .body h2, .reader .body h3 { font-family:'Source Serif 4', Georgia, serif; margin-top:1.2em; margin-bottom:0.4em; }
  .reader .body code { background:var(--chrome-mute); padding:1px 5px; border-radius:4px; font-family:ui-monospace, monospace; font-size:13px; }
  .reader .empty { background:transparent; padding:48px 20px; }

  /* Editor */
  .editor { display:none; }
  .editor.open { display:block; }
  .editor label { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-top:10px; margin-bottom:4px; }
  .editor input, .editor textarea {
    width:100%; border:1px solid var(--chrome-mute); border-radius:8px; padding:9px 11px; font:inherit; font-size:14px;
    min-height:38px; color:var(--ink); background:#fff;
  }
  .editor textarea { min-height:300px; resize:vertical; font-family:ui-monospace, monospace; font-size:13.5px; line-height:1.55; }
  .editor .actions { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }

  @media (max-width:700px) {
    .page { padding:14px 14px 60px; }
    .page-head h1 { font-size:22px; }
  }
  @media print {
    header.topbar, .toolbar, .list, .head-actions, .editor { display:none !important; }
    .split { grid-template-columns:1fr; }
    body { background:#fff; }
    .reader { box-shadow:none; border:0; padding:0; }
  }
</style>
<script src="bcc-api.js" defer></script>
</head>
<body>
<header class="topbar">
  <a class="home" href="index.html">
    <img src="bcc-logo.png" alt="Blue Collar Coach" />
    <span class="wordmark">BLUE COLLAR <span class="light">COACH</span></span>
  </a>
  <span class="module">Knowledge Base</span>
  <span style="flex:1;"></span>
</header>

<div class="page">
  <div class="page-head">
    <div>
      <h1>Knowledge Base</h1>
      <div class="sub" id="subline">Internal playbooks. Markdown is supported lightly (headings, bold, code).</div>
    </div>
    <button class="btn btn-primary" id="newBtn" type="button">+ New article</button>
  </div>

  <div class="toolbar">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;opacity:0.6;"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="q" type="search" placeholder="Search title, tags, body…" autocomplete="off" />
    </div>
    <select id="tagFilter" aria-label="Filter by tag"><option value="">All tags</option></select>
  </div>

  <div class="split">
    <div class="list" id="list"></div>
    <div class="reader" id="reader">
      <div class="empty"><div class="big">Pick an article</div><div>Or click "+ New article" to start your first playbook.</div></div>
    </div>
  </div>
</div>

<script>
(function () {
  var KB_PREFIX = 'bcc-kb-article-';
  function uid() { return 'a' + Date.now().toString(36) + Math.random().toString(36).slice(2,9); }
  function nowIso() { return new Date().toISOString(); }
  function esc(s) { return String(s == null ? '' : s).replace(/[<>&"']/g, function (c) { return ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]); }); }
  function slugify(s) { return String(s || '').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,''); }
  function tinyMd(body) {
    // Extremely light Markdown: ##/### headings, **bold**, `code`, single line breaks preserved.
    var safe = esc(body);
    safe = safe.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    safe = safe.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    safe = safe.replace(/^# (.+)$/gm,  '<h1>$1</h1>');
    safe = safe.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    safe = safe.replace(/`([^`]+)`/g, '<code>$1</code>');
    return safe;
  }

  function allArticles() {
    var out = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i); if (!k || k.indexOf(KB_PREFIX) !== 0) continue;
      try { var a = JSON.parse(localStorage.getItem(k)); if (a && a.id) out.push(a); } catch (_) {}
    }
    return out.sort(function (a, b) { return (b.updatedAt || '').localeCompare(a.updatedAt || ''); });
  }
  function getArticle(id) { try { return JSON.parse(localStorage.getItem(id) || 'null'); } catch (_) { return null; } }
  function saveArticle(a) {
    a.updatedAt = nowIso();
    if (!a.createdAt) a.createdAt = a.updatedAt;
    if (!a.id) a.id = KB_PREFIX + uid();
    if (!a.tenantId) a.tenantId = 'blue-collar-coach';
    a.docType = 'kb-article';
    if (!a.slug) a.slug = slugify(a.title || 'untitled');
    localStorage.setItem(a.id, JSON.stringify(a));
    return a;
  }
  function deleteArticle(id) { localStorage.removeItem(id); }

  var currentId = null;
  var qInput, tagFilter, listEl, readerEl;

  function renderList() {
    var all = allArticles();
    var q = (qInput.value || '').trim().toLowerCase();
    var tag = tagFilter.value;
    var matched = all.filter(function (a) {
      if (tag && !(a.tags || []).includes(tag)) return false;
      if (!q) return true;
      var hay = [a.title, (a.tags || []).join(' '), a.body].filter(Boolean).join(' ').toLowerCase();
      return hay.indexOf(q) >= 0;
    });
    if (matched.length === 0) {
      listEl.innerHTML = '<div class="empty"><div class="big">' + (all.length === 0 ? 'No articles yet.' : 'No matches.') + '</div></div>';
    } else {
      listEl.innerHTML = matched.map(function (a) {
        var tags = (a.tags || []).slice(0, 3).map(function (t) { return '<span class="tag">' + esc(t) + '</span>'; }).join(' ');
        return '<div class="item' + (a.id === currentId ? ' active' : '') + '" data-id="' + esc(a.id) + '">' +
          '<div class="title">' + esc(a.title || '(untitled)') + '</div>' +
          '<div class="meta">' + (tags || '<span style="color:var(--muted);font-size:11px;">no tags</span>') +
          ' <span>· ' + new Date(a.updatedAt || a.createdAt).toLocaleDateString([], { month:'short', day:'numeric' }) + '</span></div>' +
        '</div>';
      }).join('');
    }
    // populate tag filter
    var tags = {};
    all.forEach(function (a) { (a.tags || []).forEach(function (t) { tags[t] = true; }); });
    var cur = tagFilter.value;
    tagFilter.innerHTML = '<option value="">All tags</option>' +
      Object.keys(tags).sort().map(function (t) { return '<option value="' + esc(t) + '">' + esc(t) + '</option>'; }).join('');
    tagFilter.value = cur;

    listEl.querySelectorAll('.item').forEach(function (el) {
      el.addEventListener('click', function () { openArticle(el.dataset.id); });
    });
  }

  function openArticle(id) {
    currentId = id;
    var a = getArticle(id); if (!a) return;
    var tags = (a.tags || []).map(function (t) { return '<span class="tag">' + esc(t) + '</span>'; }).join('');
    readerEl.innerHTML =
      '<div class="head-actions">' +
        '<div>' +
          '<h2>' + esc(a.title) + '</h2>' +
          '<div class="meta">' +
            '<span>' + esc(a.authorUpn || 'unknown') + '</span>' +
            '<span>· last updated ' + new Date(a.updatedAt).toLocaleDateString([], { month:'long', day:'numeric', year:'numeric' }) + '</span>' +
            (tags ? '<span class="tags">' + tags + '</span>' : '') +
          '</div>' +
        '</div>' +
        '<div style="display:flex; gap:6px; flex-shrink:0;">' +
          '<button class="btn btn-ghost" data-act="edit" type="button">Edit</button>' +
          '<button class="btn btn-ghost" data-act="print" type="button">Print</button>' +
          '<button class="btn btn-danger" data-act="del" type="button">Delete</button>' +
        '</div>' +
      '</div>' +
      '<div class="body">' + tinyMd(a.body || '') + '</div>';
    readerEl.querySelector('button[data-act=edit]').addEventListener('click', function () { openEditor(id); });
    readerEl.querySelector('button[data-act=print]').addEventListener('click', function () { window.print(); });
    readerEl.querySelector('button[data-act=del]').addEventListener('click', function () {
      if (!confirm('Delete this article? It\'s gone from cloud sync too.')) return;
      deleteArticle(id);
      if (window.bccAudit) window.bccAudit('kb-article-delete', { key: id, path: '/kb.html' });
      currentId = null;
      readerEl.innerHTML = '<div class="empty"><div class="big">Pick an article</div></div>';
      renderList();
    });
    renderList();
  }

  function openEditor(id) {
    var a = id ? getArticle(id) : { id: '', title: '', tags: [], body: '' };
    readerEl.innerHTML =
      '<div class="editor open">' +
        '<h2 style="font-family:\'Source Serif 4\',Georgia,serif;margin:0 0 12px;">' + (id ? 'Edit article' : 'New article') + '</h2>' +
        '<label>Title<input type="text" id="ed-title" /></label>' +
        '<label>Tags (comma-separated)<input type="text" id="ed-tags" /></label>' +
        '<label>Body (Markdown lite: # ## ### **bold** `code`)<textarea id="ed-body"></textarea></label>' +
        '<div class="actions">' +
          '<button class="btn btn-ghost" id="ed-cancel" type="button">Cancel</button>' +
          '<button class="btn btn-primary" id="ed-save" type="button">' + (id ? 'Save changes' : 'Create article') + '</button>' +
        '</div>' +
      '</div>';
    document.getElementById('ed-title').value = a.title || '';
    document.getElementById('ed-tags').value = (a.tags || []).join(', ');
    document.getElementById('ed-body').value = a.body || '';
    document.getElementById('ed-cancel').addEventListener('click', function () {
      if (id) openArticle(id);
      else { readerEl.innerHTML = '<div class="empty"><div class="big">Pick an article</div></div>'; }
    });
    document.getElementById('ed-save').addEventListener('click', function () {
      var title = document.getElementById('ed-title').value.trim();
      if (!title) { (window.bccNotify || alert)('Title required.', 'warn'); return; }
      var rec = id ? (getArticle(id) || {}) : {};
      rec.title = title;
      rec.tags = document.getElementById('ed-tags').value.split(',').map(function (s) { return s.trim(); }).filter(Boolean);
      rec.body = document.getElementById('ed-body').value;
      rec.authorUpn = (window.bccUser && window.bccUser.userDetails) || rec.authorUpn || '';
      saveArticle(rec);
      if (window.bccAudit) window.bccAudit(id ? 'kb-article-update' : 'kb-article-create', { key: rec.id, path: '/kb.html' });
      if (window.bccNotifySaved) window.bccNotifySaved('Article saved.');
      openArticle(rec.id);
    });
    setTimeout(function () { document.getElementById('ed-title').focus(); }, 50);
  }

  document.getElementById('newBtn').addEventListener('click', function () { openEditor(null); });

  function init() {
    qInput = document.getElementById('q');
    tagFilter = document.getElementById('tagFilter');
    listEl = document.getElementById('list');
    readerEl = document.getElementById('reader');
    qInput.addEventListener('input', renderList);
    tagFilter.addEventListener('change', renderList);
    renderList();
  }
  window.addEventListener('bcc-data-ready', renderList);
  window.addEventListener('bcc-auth-ready', function () { document.body.dataset.didInit = '1'; init(); });
  setTimeout(function () { if (!document.body.dataset.didInit) { document.body.dataset.didInit = '1'; init(); } }, 600);
})();
</script>
</body>
</html>
