<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#1a1a1a" />
<meta name="robots" content="noindex, nofollow" />
<title>Scheduler · BCC Connect</title>
<link rel="icon" type="image/png" href="bcc-logo.png" />
<link rel="manifest" href="manifest.json" />
<style>
  :root {
    --ink:#1a1a1a; --ink-line:#2e2c27;
    --gold:#c5a55a; --gold-warm:#d4b67a; --gold-deep:#a8884a; --gold-fade:rgba(197,165,90,0.12);
    --chrome:#f6f6f4; --chrome-mute:#e6e5e1; --muted:#6b7077;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Inter', system-ui, sans-serif; color:var(--ink); background:var(--chrome); }
  header.topbar {
    display:flex; align-items:center; gap:14px; padding:12px 22px; color:var(--chrome);
    background:linear-gradient(90deg, #141414, #1f1f1f);
    border-bottom:1px solid var(--ink-line); position:sticky; top:0; z-index:50;
  }
  header.topbar a.home { display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--chrome); }
  header.topbar img { height:30px; }
  header.topbar .wordmark { font-family:'Source Serif 4', Georgia, serif; font-size:14px; font-weight:700; letter-spacing:1.5px; }
  header.topbar .wordmark .light { color:var(--gold); }
  header.topbar .module {
    font-size:11px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--gold-warm);
    border-left:1px solid rgba(255,255,255,0.18); padding-left:14px; margin-left:4px;
  }
  .page { max-width:1400px; margin:0 auto; padding:18px 18px 70px; }
  .page-head { display:flex; align-items:flex-end; justify-content:space-between; gap:14px; margin-bottom:14px; flex-wrap:wrap; }
  .page-head h1 { font-family:'Source Serif 4', Georgia, serif; font-size:26px; margin:0; }
  .page-head .sub { color:var(--muted); font-size:13px; margin-top:4px; }
  .btn { min-height:38px; border:0; border-radius:8px; padding:0 14px; font:inherit; font-weight:700; font-size:13px; cursor:pointer; }
  .btn-primary { background:var(--gold); color:#fff; }
  .btn-primary:hover { background:var(--gold-deep); }
  .btn-ghost { background:transparent; color:var(--ink); border:1px solid var(--chrome-mute); }
  .btn-ghost:hover { background:var(--chrome-mute); }

  .toolbar {
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    background:#fff; padding:12px; border:1px solid var(--chrome-mute);
    border-radius:12px; margin-bottom:14px;
  }
  .toolbar .navbtns { display:flex; gap:6px; }
  .toolbar .navbtns button { min-height:38px; padding:0 12px; border:1px solid var(--chrome-mute); background:#fff; border-radius:8px; cursor:pointer; font:inherit; font-weight:700; font-size:13px; color:var(--ink); }
  .toolbar .navbtns button:hover { background:var(--chrome-mute); }
  .toolbar .label { font-family:'Source Serif 4', Georgia, serif; font-size:18px; flex:1; text-align:center; }
  .view-toggle { display:flex; gap:0; border:1px solid var(--chrome-mute); border-radius:8px; overflow:hidden; }
  .view-toggle button {
    background:#fff; border:0; padding:0 14px; min-height:38px;
    font:inherit; font-weight:700; font-size:12.5px; cursor:pointer; color:var(--muted);
  }
  .view-toggle button.active { background:var(--ink); color:var(--gold-warm); }

  /* Month grid */
  .month-grid {
    display:grid; grid-template-columns:repeat(7, 1fr); gap:6px;
    background:var(--chrome-mute); border:1px solid var(--chrome-mute);
    border-radius:12px; overflow:hidden;
  }
  .dow-head { background:#fff; padding:8px 10px; font-size:10.5px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1.4px; text-align:center; }
  .day {
    background:#fff; min-height:110px; padding:8px; display:flex; flex-direction:column; gap:4px;
    cursor:pointer; transition:background 0.12s;
  }
  .day:hover { background:var(--gold-fade); }
  .day.other-month { background:#fdfcfa; color:var(--muted); }
  .day.today { box-shadow:inset 0 0 0 2px var(--gold); }
  .day .num {
    font-family:'Source Serif 4', Georgia, serif; font-size:14px; font-weight:700; color:var(--ink);
    display:flex; align-items:center; justify-content:space-between;
  }
  .day.today .num { color:var(--gold-deep); }
  .day.other-month .num { color:var(--muted); }
  .day .num .count { font-family:'Inter', sans-serif; font-size:10px; font-weight:700; color:var(--gold); background:var(--gold-fade); padding:1px 6px; border-radius:999px; }
  .day .ev {
    background:var(--gold-fade); border-left:3px solid var(--gold);
    border-radius:5px; padding:3px 6px; font-size:11px; line-height:1.3; cursor:pointer;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .day .ev:hover { background:rgba(168,136,74,0.22); }
  .day .ev .t { font-weight:700; color:var(--ink); }
  .day .more { font-size:10.5px; color:var(--muted); font-weight:600; cursor:pointer; padding:2px 4px; }
  .day .more:hover { color:var(--gold-deep); }

  /* Year mini view */
  .year-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:14px; }
  @media (max-width:900px) { .year-grid { grid-template-columns:repeat(2, 1fr); } }
  @media (max-width:560px) { .year-grid { grid-template-columns:1fr; } }
  .mini-month { background:#fff; border:1px solid var(--chrome-mute); border-radius:12px; padding:14px; cursor:pointer; }
  .mini-month:hover { border-color:var(--gold); }
  .mini-month h3 { font-family:'Source Serif 4', Georgia, serif; font-size:15px; margin:0 0 8px; text-align:center; }
  .mini-month .mini-grid { display:grid; grid-template-columns:repeat(7, 1fr); gap:2px; }
  .mini-month .mini-day {
    aspect-ratio:1; display:flex; align-items:center; justify-content:center;
    font-size:11px; color:var(--ink); border-radius:3px;
  }
  .mini-month .mini-day.has-events { background:var(--gold-fade); color:var(--gold-deep); font-weight:700; }
  .mini-month .mini-day.today { background:var(--gold); color:#fff; font-weight:700; }
  .mini-month .mini-day.other-month { color:var(--chrome-mute); }
  .mini-month .mini-dow { font-size:9px; font-weight:700; color:var(--muted); text-align:center; text-transform:uppercase; }

  /* Day-detail modal */
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; display:none; align-items:center; justify-content:center; padding:18px; }
  .modal-bg.open { display:flex; }
  .modal { background:#fff; border-radius:14px; padding:22px; max-width:520px; width:100%; max-height:90vh; overflow-y:auto; }
  .modal h3 { font-family:'Source Serif 4', Georgia, serif; font-size:18px; margin:0 0 10px; }
  .modal .day-evs { display:flex; flex-direction:column; gap:8px; max-height:50vh; overflow-y:auto; }
  .modal .day-ev {
    padding:10px 12px; background:var(--chrome); border-radius:8px;
    border-left:3px solid var(--gold); cursor:pointer;
  }
  .modal .day-ev:hover { background:var(--gold-fade); }
  .modal .day-ev .t { font-weight:700; font-size:13.5px; color:var(--ink); }
  .modal .day-ev .meta { font-size:12px; color:var(--muted); margin-top:2px; }
  .modal .actions { display:flex; gap:8px; justify-content:space-between; margin-top:14px; flex-wrap:wrap; }

  @media (max-width:760px) {
    .page { padding:14px 14px 60px; }
    .page-head h1 { font-size:22px; }
    .day { min-height:64px; padding:5px; }
    .day .ev { font-size:10px; padding:2px 4px; }
    .day .num { font-size:12px; }
    .toolbar .label { font-size:15px; }
  }
  @media print {
    header.topbar, .toolbar, .modal-bg { display:none !important; }
    body { background:#fff; }
    .month-grid { box-shadow:none; }
  }
</style>
<script src="bcc-api.js" defer></script>
</head>
<body>
<header class="topbar">
  <a class="home" href="index.html">
    <img src="bcc-logo.png" alt="Blue Collar Coach" />
    <span class="wordmark">BLUE COLLAR <span class="light">COACH</span></span>
  </a>
  <span class="module">Scheduler</span>
  <span style="flex:1;"></span>
</header>

<div class="page">
  <div class="page-head">
    <div>
      <h1 id="pageTitle">Calendar</h1>
      <div class="sub">Month + year views of every coaching session, training day, and event. Click a day to drill in. For the focused week view, open <a href="sessions.html" style="color:var(--gold-deep); text-decoration:none; font-weight:700;">Sessions</a>.</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="navbtns">
      <button id="prevBtn" type="button">&larr;</button>
      <button id="todayBtn" type="button">Today</button>
      <button id="nextBtn" type="button">&rarr;</button>
    </div>
    <span class="label" id="periodLabel"></span>
    <div class="view-toggle">
      <button data-view="month" class="active" type="button">Month</button>
      <button data-view="year" type="button">Year</button>
    </div>
    <button class="btn btn-primary" id="newBtn" type="button">+ Session</button>
  </div>

  <div id="monthView"></div>
  <div id="yearView" hidden></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalDate">Day</h3>
    <div class="day-evs" id="dayEvs"></div>
    <div class="actions">
      <button class="btn btn-ghost" id="m-close" type="button">Close</button>
      <button class="btn btn-primary" id="m-newOnDay" type="button">+ New session on this day</button>
    </div>
  </div>
</div>

<script>
(function () {
  var SESSION_PREFIX = 'bcc-session-';
  var EVENT_PREFIX = 'bcc-event-';
  var CONTACT_PREFIX = 'bcc-contact-';

  function esc(s) { return String(s == null ? '' : s).replace(/[<>&"']/g, function (c) { return ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]); }); }
  function ymd(d) { var pad = function (n) { return String(n).padStart(2,'0'); }; return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }

  function allItems() {
    var out = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i); if (!k) continue;
      if (k.indexOf(SESSION_PREFIX) === 0) {
        try { var s = JSON.parse(localStorage.getItem(k)); if (s && s.startAt) out.push({ kind:'session', startAt:s.startAt, title:s.title, location:s.location, contactId:s.contactId, id:s.id, href:'sessions.html' }); } catch (_) {}
      } else if (k.indexOf(EVENT_PREFIX) === 0) {
        try { var e = JSON.parse(localStorage.getItem(k)); if (e && e.startAt) out.push({ kind:'event', startAt:e.startAt, title:e.title, location:e.location, id:e.id, href:'events.html' }); } catch (_) {}
      }
    }
    return out;
  }
  function contactById(id) { try { return JSON.parse(localStorage.getItem(id) || 'null'); } catch (_) { return null; } }
  function contactName(c) { if (!c) return ''; return ((c.firstName || '') + ' ' + (c.lastName || '')).trim() || c.email || ''; }

  function itemsOn(date) {
    var y = ymd(date);
    return allItems().filter(function (it) {
      var t = new Date(it.startAt); return !isNaN(t) && ymd(t) === y;
    }).sort(function (a, b) { return new Date(a.startAt) - new Date(b.startAt); });
  }

  /* ===== State ===== */
  var view = 'month';
  var cursor = new Date(); cursor.setDate(1);

  function shiftMonth(n) { cursor.setMonth(cursor.getMonth() + n); render(); }
  function shiftYear(n) { cursor.setFullYear(cursor.getFullYear() + n); render(); }

  /* ===== Month view ===== */
  function renderMonth() {
    var monthStart = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
    var gridStart = new Date(monthStart); gridStart.setDate(1 - monthStart.getDay()); // back up to Sunday
    var today = new Date(); today.setHours(0,0,0,0);

    var html = '<div class="month-grid">';
    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(function (d) {
      html += '<div class="dow-head">' + d + '</div>';
    });

    for (var w = 0; w < 6; w++) {
      for (var i = 0; i < 7; i++) {
        var d = new Date(gridStart); d.setDate(gridStart.getDate() + w*7 + i);
        var inMonth = d.getMonth() === monthStart.getMonth();
        var isToday = d.getTime() === today.getTime();
        var dayItems = itemsOn(d);
        html += '<div class="day' + (inMonth ? '' : ' other-month') + (isToday ? ' today' : '') + '" data-day="' + ymd(d) + '">' +
          '<div class="num">' + d.getDate() + (dayItems.length > 0 ? '<span class="count">' + dayItems.length + '</span>' : '') + '</div>';
        dayItems.slice(0, 3).forEach(function (it) {
          var t = new Date(it.startAt);
          var time = t.toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
          html += '<div class="ev" data-id="' + esc(it.id) + '"><span class="t">' + esc(time) + '</span> ' + esc(it.title || '(untitled)') + '</div>';
        });
        if (dayItems.length > 3) html += '<div class="more" data-more="' + ymd(d) + '">+' + (dayItems.length - 3) + ' more</div>';
        html += '</div>';
      }
    }
    html += '</div>';
    document.getElementById('monthView').innerHTML = html;
    document.getElementById('monthView').hidden = false;
    document.getElementById('yearView').hidden = true;
    document.getElementById('periodLabel').textContent = monthStart.toLocaleDateString([], { month:'long', year:'numeric' });

    document.querySelectorAll('.day').forEach(function (el) {
      el.addEventListener('click', function (e) {
        if (e.target.closest('.ev')) return; // event row handles itself
        openDayModal(el.dataset.day);
      });
    });
    document.querySelectorAll('.ev[data-id]').forEach(function (el) {
      el.addEventListener('click', function (e) {
        e.stopPropagation();
        // Jump to the relevant module (sessions or events)
        var id = el.dataset.id;
        if (id.indexOf(SESSION_PREFIX) === 0) location.href = 'sessions.html';
        else if (id.indexOf(EVENT_PREFIX) === 0) location.href = 'events.html';
      });
    });
  }

  /* ===== Year view ===== */
  function renderYear() {
    var year = cursor.getFullYear();
    var today = new Date(); today.setHours(0,0,0,0);
    var months = [];
    for (var m = 0; m < 12; m++) {
      var first = new Date(year, m, 1);
      var gridStart = new Date(first); gridStart.setDate(1 - first.getDay());
      var grid = '';
      ['S','M','T','W','T','F','S'].forEach(function (l) { grid += '<div class="mini-dow">' + l + '</div>'; });
      for (var w = 0; w < 6; w++) {
        for (var i = 0; i < 7; i++) {
          var d = new Date(gridStart); d.setDate(gridStart.getDate() + w*7 + i);
          var inMonth = d.getMonth() === m;
          var isToday = d.getTime() === today.getTime();
          var has = itemsOn(d).length > 0;
          var cls = isToday ? 'mini-day today' : (has ? 'mini-day has-events' : 'mini-day' + (inMonth ? '' : ' other-month'));
          grid += '<div class="' + cls + '" data-day="' + ymd(d) + '">' + d.getDate() + '</div>';
        }
      }
      months.push('<div class="mini-month" data-month="' + m + '">' +
        '<h3>' + first.toLocaleDateString([], { month:'long' }) + '</h3>' +
        '<div class="mini-grid">' + grid + '</div>' +
      '</div>');
    }
    document.getElementById('yearView').innerHTML = '<div class="year-grid">' + months.join('') + '</div>';
    document.getElementById('monthView').hidden = true;
    document.getElementById('yearView').hidden = false;
    document.getElementById('periodLabel').textContent = String(year);

    document.querySelectorAll('.mini-month').forEach(function (el) {
      el.addEventListener('click', function () {
        cursor = new Date(year, parseInt(el.dataset.month, 10), 1);
        view = 'month';
        document.querySelectorAll('.view-toggle button').forEach(function (b) { b.classList.toggle('active', b.dataset.view === 'month'); });
        render();
      });
    });
  }

  /* ===== Day modal ===== */
  function openDayModal(yStr) {
    var d = new Date(yStr + 'T12:00:00');
    var items = itemsOn(d);
    document.getElementById('modalDate').textContent = d.toLocaleDateString([], { weekday:'long', month:'long', day:'numeric', year:'numeric' });
    document.getElementById('dayEvs').innerHTML = items.length === 0
      ? '<p style="color:var(--muted); font-style:italic; font-size:13px; padding:14px 0;">No sessions or events on this day.</p>'
      : items.map(function (it) {
          var t = new Date(it.startAt);
          var time = t.toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
          var who = it.contactId ? contactName(contactById(it.contactId)) : '';
          return '<div class="day-ev" data-href="' + esc(it.href) + '">' +
            '<div class="t">' + esc(time) + ' &middot; ' + esc(it.title || '(untitled)') + '</div>' +
            '<div class="meta">' + esc(it.kind === 'session' ? 'Coaching session' : 'Event') + (who ? ' &middot; ' + esc(who) : '') + (it.location ? ' &middot; ' + esc(it.location) : '') + '</div>' +
          '</div>';
        }).join('');
    document.getElementById('dayEvs').querySelectorAll('.day-ev').forEach(function (el) {
      el.addEventListener('click', function () { location.href = el.dataset.href; });
    });
    document.getElementById('m-newOnDay').onclick = function () {
      // Drop a hint via sessionStorage so sessions.html can pre-fill the modal
      sessionStorage.setItem('bcc-new-session-day', yStr);
      location.href = 'sessions.html';
    };
    document.getElementById('modalBg').classList.add('open');
  }
  document.getElementById('m-close').addEventListener('click', function () { document.getElementById('modalBg').classList.remove('open'); });
  document.getElementById('modalBg').addEventListener('click', function (e) { if (e.target.id === 'modalBg') document.getElementById('modalBg').classList.remove('open'); });

  /* ===== Wiring ===== */
  document.getElementById('prevBtn').addEventListener('click', function () { (view === 'month' ? shiftMonth : shiftYear)(-1); });
  document.getElementById('nextBtn').addEventListener('click', function () { (view === 'month' ? shiftMonth : shiftYear)(+1); });
  document.getElementById('todayBtn').addEventListener('click', function () { cursor = new Date(); cursor.setDate(1); render(); });
  document.getElementById('newBtn').addEventListener('click', function () { location.href = 'sessions.html'; });
  document.querySelectorAll('.view-toggle button').forEach(function (b) {
    b.addEventListener('click', function () {
      view = b.dataset.view;
      document.querySelectorAll('.view-toggle button').forEach(function (x) { x.classList.toggle('active', x === b); });
      render();
    });
  });

  function render() {
    if (view === 'month') renderMonth();
    else renderYear();
  }

  function init() { render(); }
  window.addEventListener('bcc-data-ready', render);
  window.addEventListener('bcc-auth-ready', function () { document.body.dataset.didInit = '1'; init(); });
  setTimeout(function () { if (!document.body.dataset.didInit) { document.body.dataset.didInit = '1'; init(); } }, 600);
})();
</script>
</body>
</html>
