<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#1a1a1a" />
<meta name="robots" content="noindex, nofollow" />
<title>Activity Log · BCC Connect</title>
<link rel="icon" type="image/png" href="bcc-logo.png" />
<link rel="manifest" href="manifest.json" />
<style>
  :root {
    --ink:#1a1a1a; --ink-soft:#2b2b2b; --ink-line:#2e2c27;
    --gold:#c5a55a; --gold-warm:#d4b67a; --gold-deep:#a8884a;
    --gold-fade:rgba(197,165,90,0.12);
    --chrome:#f6f6f4; --chrome-mute:#e6e5e1; --muted:#6b7077;
    --danger:#6a1c1c; --danger-bg:#f3e0e0;
    --success:#065f46; --success-bg:#d1fae5;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Inter', system-ui, sans-serif; color:var(--ink); background:var(--chrome); }
  header.topbar {
    display:flex; align-items:center; gap:14px; padding:12px 22px; color:var(--chrome);
    background:linear-gradient(90deg, #141414, #1f1f1f);
    border-bottom:1px solid var(--ink-line); position:sticky; top:0; z-index:50;
  }
  header.topbar a.home { display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--chrome); }
  header.topbar img { height:30px; }
  header.topbar .wordmark { font-family:'Source Serif 4', Georgia, serif; font-size:14px; font-weight:700; letter-spacing:1.5px; }
  header.topbar .wordmark .light { color:var(--gold); }
  header.topbar .module {
    font-size:11px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--gold-warm);
    border-left:1px solid rgba(255,255,255,0.18); padding-left:14px; margin-left:4px;
  }

  .page { max-width:1100px; margin:0 auto; padding:22px 22px 70px; }
  .page-head { display:flex; align-items:flex-end; justify-content:space-between; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
  .page-head h1 { font-family:'Source Serif 4', Georgia, serif; font-size:26px; margin:0; }
  .page-head .sub { color:var(--muted); font-size:13px; margin-top:4px; }
  .page-head .meta { font-size:12px; color:var(--muted); }

  /* Gate / unlock card */
  .gate {
    background:linear-gradient(160deg, #1f1f1f 0%, #1a1a1a 100%); color:var(--chrome);
    border:1px solid var(--ink-line); border-radius:14px; padding:30px;
    max-width:480px; margin:48px auto; text-align:center;
  }
  .gate h2 { font-family:'Source Serif 4', Georgia, serif; font-size:22px; margin:0 0 8px; color:var(--gold-warm); }
  .gate p  { color:rgba(255,255,255,0.65); font-size:13.5px; line-height:1.55; margin:0 0 16px; }
  .gate input {
    width:100%; padding:11px 14px; border:1px solid rgba(255,255,255,0.18);
    background:#141414; color:#fff; border-radius:8px;
    font:inherit; font-size:14px; min-height:42px;
  }
  .gate input:focus { outline:2px solid var(--gold); outline-offset:-1px; border-color:var(--gold); }
  .gate button {
    appearance:none; -webkit-appearance:none;
    width:100%; margin-top:10px; padding:11px; border:0; border-radius:8px;
    background:var(--gold, #c5a55a); color:var(--ink); font:inherit; font-weight:700; font-size:14px; cursor:pointer;
    line-height:1; letter-spacing:0.3px;
    transition:background 0.15s, transform 0.05s;
  }
  .gate button:hover { background:var(--gold-warm, #d4b67a); }
  .gate button:active { transform:translateY(1px); }
  .gate button:focus-visible { outline:2px solid var(--gold-warm, #d4b67a); outline-offset:2px; }
  .gate .err { color:#d9bdbd; font-size:12.5px; font-weight:600; margin-top:10px; min-height:18px; }

  /* Toolbar */
  .toolbar {
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    background:#fff; padding:12px; border:1px solid var(--chrome-mute);
    border-radius:12px; margin-bottom:14px;
  }
  .toolbar .search { flex:1; min-width:200px; display:flex; align-items:center; gap:8px;
    background:var(--chrome); border:1px solid var(--chrome-mute); border-radius:8px;
    padding:8px 12px; min-height:38px; }
  .toolbar .search input { flex:1; border:none; outline:none; background:transparent; font:inherit; font-size:14px; min-width:0; }
  .toolbar select {
    background:var(--chrome); border:1px solid var(--chrome-mute); border-radius:8px;
    padding:8px 10px; font:inherit; font-size:13px; min-height:38px; min-width:140px;
  }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; min-height:38px; border:0; border-radius:8px; padding:0 14px; font:inherit; font-weight:700; font-size:13px; cursor:pointer; -webkit-appearance:none; appearance:none; transition:background .14s ease, border-color .14s ease, color .14s ease, transform .06s ease; }
  .btn:active { transform:translateY(1px); }
  .btn:focus-visible { outline:2px solid var(--gold); outline-offset:1px; }
  .btn-primary { background:var(--gold); color:#fff; }
  .btn-primary:hover { background:var(--gold-deep); }
  .btn-ghost { background:transparent; color:var(--ink); border:1px solid var(--chrome-mute); }
  .btn-ghost:hover { background:var(--chrome-mute); }

  /* Feed */
  .feed { display:flex; flex-direction:column; gap:0; background:#fff; border:1px solid var(--chrome-mute); border-radius:12px; overflow:hidden; }
  .event {
    display:grid; grid-template-columns:42px 1fr auto; gap:14px; align-items:flex-start;
    padding:14px 16px; border-bottom:1px solid var(--chrome-mute);
  }
  .event:last-child { border-bottom:none; }
  .event:hover { background:var(--gold-fade); }
  .event .ic {
    width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center;
    font-size:15px; background:var(--gold-fade); color:var(--gold-deep);
  }
  .event.t-admin .ic     { background:rgba(168,136,74,0.20); color:var(--gold-deep); }
  .event.t-crm .ic       { background:#ddeefd; color:#1d4ed8; }
  .event.t-session .ic   { background:#d1fae5; color:#065f46; }
  .event.t-doc .ic       { background:#fff4d6; color:#92400e; }
  .event.t-rate .ic      { background:var(--gold-fade); color:var(--gold-deep); }
  .event.t-time .ic      { background:#ede9fe; color:#5b21b6; }
  .event.t-integration .ic { background:#cffafe; color:#0e7490; }
  .event.t-system .ic    { background:#f1efe9; color:var(--muted); }
  .event .body .what    { font-size:13.5px; color:var(--ink); font-weight:600; }
  .event .body .who     { font-size:12px; color:var(--muted); margin-top:2px; }
  .event .body .meta    { font-size:11.5px; color:var(--muted); margin-top:3px; font-family:ui-monospace, monospace; }
  .event .when          { font-size:11.5px; color:var(--muted); white-space:nowrap; text-align:right; }
  .event .when .ago     { font-weight:700; color:var(--ink); display:block; }

  .empty { padding:48px 20px; text-align:center; color:var(--muted); }
  .empty .big { font-family:'Source Serif 4', Georgia, serif; font-size:18px; color:var(--ink); margin-bottom:6px; }

  @media (max-width:700px) {
    .page { padding:14px 14px 60px; }
    .page-head h1 { font-size:22px; }
    .event { grid-template-columns:32px 1fr; }
    .event .when { grid-column:2; text-align:left; margin-top:4px; }
  }
  @media print {
    header.topbar, .toolbar, .gate { display:none !important; }
    body { background:#fff; }
    .feed { box-shadow:none; border:1px solid #ccc; }
  }
</style>
<script src="bcc-api.js" defer></script>
</head>
<body>
<header class="topbar">
  <a class="home" href="index.html">
    <img src="bcc-logo.png" alt="Blue Collar Coach" />
    <span class="wordmark">BLUE COLLAR <span class="light">COACH</span></span>
  </a>
  <span class="module">Activity Log</span>
  <span style="flex:1;"></span>
</header>

<div class="page">
  <!-- Gate (password) -->
  <section class="gate" id="gate" hidden>
    <h2>Activity Log</h2>
    <p>This feed shows every save, sign-in, configuration change, and integration test across the workspace. It's gated by a password so even an admin can't peek without intent — rotate the password in <a href="admin.html" style="color:var(--gold-warm); text-decoration:none; font-weight:700;">Admin → Security</a>.</p>
    <input id="gatePw" type="password" placeholder="Enter activity-log password" autocomplete="off" />
    <button id="gateBtn" type="button">Unlock</button>
    <div class="err" id="gateErr"></div>
  </section>

  <!-- Main feed -->
  <div id="main" hidden>
    <div class="page-head">
      <div>
        <h1>Activity Log</h1>
        <div class="sub" id="subline">Loading…</div>
      </div>
      <div class="meta" id="syncMeta"></div>
    </div>

    <div class="toolbar">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;opacity:0.6;"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input id="q" type="search" placeholder="Search by action, user, key, or path…" autocomplete="off" />
      </div>
      <select id="categoryFilter" aria-label="Filter by category">
        <option value="">All categories</option>
        <option value="admin">Admin</option>
        <option value="crm">CRM</option>
        <option value="session">Sessions</option>
        <option value="doc">Documents</option>
        <option value="rate">Rates</option>
        <option value="time">My Day</option>
        <option value="integration">Integrations</option>
        <option value="system">System / access</option>
      </select>
      <select id="userFilter" aria-label="Filter by user">
        <option value="">All users</option>
      </select>
      <button class="btn btn-ghost" id="refreshBtn" type="button">Refresh</button>
      <button class="btn btn-ghost" id="lockBtn" type="button">Lock</button>
    </div>

    <div class="feed" id="feed">
      <div class="empty" id="empty"><div class="big">Loading…</div></div>
    </div>
  </div>
</div>

<script>
(function () {
  var CFG_KEY = 'bcc-admin-config-v1';

  function loadCfg() {
    try { var raw = localStorage.getItem(CFG_KEY); if (raw) return JSON.parse(raw); } catch (e) {}
    return null;
  }
  function getPassword() {
    var cfg = loadCfg();
    return (cfg && cfg.auditPassword) || 'bcc-audit-2026';
  }
  function esc(s) { return String(s == null ? '' : s).replace(/[<>&"']/g, function (c) { return ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]); }); }
  function timeAgo(date) {
    var d = new Date(date); if (isNaN(d)) return '';
    var s = (Date.now() - d.getTime()) / 1000;
    if (s < 45) return Math.round(s) + 's';
    if (s < 90) return '1 min';
    var m = s / 60;
    if (m < 45) return Math.round(m) + ' min';
    if (m < 90) return '1 hr';
    var h = m / 60;
    if (h < 24) return Math.round(h) + ' hr';
    var dd = h / 24;
    if (dd < 7) return Math.round(dd) + 'd';
    return d.toLocaleDateString([], { month:'short', day:'numeric' });
  }

  /* Action -> {label, category, icon} table.
   * Categories drive the filter dropdown + color band.
   * Any unknown action lands as { what: action, category: 'system' }.
   */
  var ACTIONS = {
    // CRM
    'contact-create':  { label:'Created contact',   cat:'crm',    ic:'&#43;' },
    'contact-update':  { label:'Updated contact',   cat:'crm',    ic:'&#9998;' },
    'contact-delete':  { label:'Deleted contact',   cat:'crm',    ic:'&#10005;' },
    'convo-add':       { label:'Logged conversation', cat:'crm', ic:'&#128172;' },
    'need-add':        { label:'Added a need',      cat:'crm',    ic:'&#9745;' },
    // Sessions
    'session-create':  { label:'Created session',   cat:'session', ic:'&#43;' },
    'session-update':  { label:'Updated session',   cat:'session', ic:'&#9998;' },
    'session-delete':  { label:'Deleted session',   cat:'session', ic:'&#10005;' },
    // Documents
    'document-metadata-add':{ label:'Started upload', cat:'doc', ic:'&#43;' },
    'document-delete': { label:'Deleted document',  cat:'doc',     ic:'&#10005;' },
    // Rates
    'rate-sheet-save': { label:'Saved rate sheet',  cat:'rate',    ic:'&#128176;' },
    'rate-signature':  { label:'Captured signature', cat:'rate',   ic:'&#9997;' },
    // My Day / time
    'clock-in':        { label:'Clocked in',        cat:'time',    ic:'&#9201;' },
    'clock-out':       { label:'Clocked out',       cat:'time',    ic:'&#9209;' },
    'daily-log-save':  { label:'Saved daily log',   cat:'time',    ic:'&#128221;' },
    // Admin
    'admin-config-save':   { label:'Saved admin config',     cat:'admin', ic:'&#9881;' },
    'customer-types-save': { label:'Saved customer types',   cat:'admin', ic:'&#127912;' },
    'admin-export':        { label:'Exported config snapshot', cat:'admin', ic:'&#x21E9;' },
    // Integrations
    'integration-save':    { label:'Saved integration',  cat:'integration', ic:'&#128279;' },
    'integration-clear':   { label:'Cleared integration', cat:'integration', ic:'&#10005;' },
    // Auth / system
    'signin-denied':       { label:'Sign-in denied (wrong domain)', cat:'system', ic:'&#128274;' }
  };

  function classifyAction(action) {
    if (ACTIONS[action]) return ACTIONS[action];
    return { label: action.replace(/-/g, ' '), cat: 'system', ic: '&#8226;' };
  }

  /* ===== Gate ===== */
  function unlock() {
    var pw = document.getElementById('gatePw').value;
    if (pw === getPassword()) {
      sessionStorage.setItem('bcc-audit-unlocked', '1');
      document.getElementById('gate').hidden = true;
      document.getElementById('main').hidden = false;
      load();
    } else {
      document.getElementById('gateErr').textContent = 'Wrong password.';
    }
  }
  function lock() {
    sessionStorage.removeItem('bcc-audit-unlocked');
    document.getElementById('gate').hidden = false;
    document.getElementById('main').hidden = true;
    document.getElementById('gatePw').value = '';
    document.getElementById('gateErr').textContent = '';
  }
  document.getElementById('gateBtn').addEventListener('click', unlock);
  document.getElementById('gatePw').addEventListener('keydown', function (e) { if (e.key === 'Enter') unlock(); });
  document.getElementById('lockBtn').addEventListener('click', lock);

  /* ===== Feed load ===== */
  var rows = [];
  var qInput, categoryFilter, userFilter, feedEl, subline;

  async function load() {
    feedEl.innerHTML = '<div class="empty"><div class="big">Loading…</div></div>';
    try {
      var r = await fetch('/api/audit', { credentials: 'include' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      var j = await r.json();
      rows = (j && j.items) || j || [];
    } catch (e) {
      rows = [];
      feedEl.innerHTML = '<div class="empty"><div class="big">Couldn\'t load</div><div>' + esc(e.message) + '</div></div>';
      return;
    }
    populateUserFilter();
    render();
  }
  function populateUserFilter() {
    var users = {};
    rows.forEach(function (r) {
      var u = r.userDetails || r.user; if (u) users[u] = true;
    });
    var cur = userFilter.value;
    userFilter.innerHTML = '<option value="">All users</option>' +
      Object.keys(users).sort().map(function (u) { return '<option value="' + esc(u) + '">' + esc(u) + '</option>'; }).join('');
    userFilter.value = cur;
  }
  function render() {
    var q = (qInput.value || '').trim().toLowerCase();
    var cat = categoryFilter.value;
    var user = userFilter.value;

    var matched = rows.filter(function (r) {
      var info = classifyAction(r.action || r.method || '');
      if (cat && info.cat !== cat) return false;
      var who = (r.userDetails || r.user || '').toLowerCase();
      if (user && who !== user.toLowerCase()) return false;
      if (!q) return true;
      var hay = [r.action, r.method, r.path, r.key, r.userDetails, r.user, JSON.stringify(r.meta || {})].filter(Boolean).join(' ').toLowerCase();
      return hay.indexOf(q) >= 0;
    });

    subline.textContent = matched.length + ' of ' + rows.length + ' event' + (rows.length === 1 ? '' : 's') + (q || cat || user ? ' shown' : '');

    if (matched.length === 0) {
      feedEl.innerHTML = '<div class="empty"><div class="big">Nothing here yet.</div><div>Activity from every module shows up the moment it happens.</div></div>';
      return;
    }

    var html = '';
    matched.slice(0, 500).forEach(function (r) {
      var ts = r.ts || r._ts || r.createdAt;
      if (typeof ts === 'number' && ts < 1e12) ts = ts * 1000;
      var date = ts ? new Date(ts) : null;
      var info;
      var what, who, metaLine;
      if (r.docType === 'access' || r.method) {
        // raw HTTP access row
        info = { label: r.method + ' ' + r.path, cat: 'system', ic: '&#128279;' };
        what = info.label;
        metaLine = (r.status ? 'HTTP ' + r.status : '') + (r.ms != null ? ' · ' + r.ms + 'ms' : '');
        who = r.userDetails || '(anonymous)';
      } else {
        info = classifyAction(r.action || '(unknown)');
        what = info.label;
        metaLine = r.key ? r.key : (r.path || '');
        if (r.meta && typeof r.meta === 'object') {
          var pairs = [];
          Object.keys(r.meta).slice(0, 3).forEach(function (k) {
            var v = r.meta[k];
            if (v == null) return;
            var sv = typeof v === 'string' ? v : JSON.stringify(v);
            if (sv.length > 60) sv = sv.slice(0, 60) + '…';
            pairs.push(k + ': ' + sv);
          });
          if (pairs.length) metaLine = (metaLine ? metaLine + ' · ' : '') + pairs.join(' · ');
        }
        who = r.userDetails || r.user || '(unknown)';
      }
      // Show "Lewis Koljonen" instead of the raw UPN when we can resolve it.
      // bccDisplayName falls back to a prettified email local-part when the
      // user isn't in window.bccPeopleFull yet.
      if (who && who !== '(anonymous)' && who !== '(unknown)' && window.bccDisplayName) {
        var pretty = window.bccDisplayName(who);
        if (pretty) who = pretty;
      }

      html +=
        '<div class="event t-' + info.cat + '">' +
          '<div class="ic">' + info.ic + '</div>' +
          '<div class="body">' +
            '<div class="what">' + esc(what) + '</div>' +
            '<div class="who">' + esc(who) + '</div>' +
            (metaLine ? '<div class="meta">' + esc(metaLine) + '</div>' : '') +
          '</div>' +
          '<div class="when">' +
            (date ? '<span class="ago">' + esc(timeAgo(date)) + '</span><span>' + esc(date.toLocaleTimeString([], { hour:'numeric', minute:'2-digit' })) + '</span>' : '') +
          '</div>' +
        '</div>';
    });
    feedEl.innerHTML = html;
  }

  /* ===== Init ===== */
  function wire() {
    qInput = document.getElementById('q');
    categoryFilter = document.getElementById('categoryFilter');
    userFilter = document.getElementById('userFilter');
    feedEl = document.getElementById('feed');
    subline = document.getElementById('subline');
    qInput.addEventListener('input', render);
    categoryFilter.addEventListener('change', render);
    userFilter.addEventListener('change', render);
    document.getElementById('refreshBtn').addEventListener('click', load);
    document.getElementById('syncMeta').textContent = 'Synced via /api/audit';
  }
  function init() {
    wire();
    if (sessionStorage.getItem('bcc-audit-unlocked') === '1') {
      document.getElementById('gate').hidden = true;
      document.getElementById('main').hidden = false;
      load();
    } else {
      document.getElementById('gate').hidden = false;
      document.getElementById('main').hidden = true;
      setTimeout(function () { document.getElementById('gatePw').focus(); }, 50);
    }
  }
  window.addEventListener('bcc-auth-ready', function () { document.body.dataset.didInit = '1'; init(); });
  setTimeout(function () { if (!document.body.dataset.didInit) { document.body.dataset.didInit = '1'; init(); } }, 600);
})();
</script>
</body>
</html>
