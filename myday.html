<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#1a1a1a" />
<meta name="robots" content="noindex, nofollow" />
<title>My Day · BCC Connect</title>
<link rel="icon" type="image/png" href="bcc-logo.png" />
<link rel="manifest" href="manifest.json" />
<style>
  :root {
    --ink:#1a1a1a; --ink-soft:#2b2b2b; --ink-line:#2e2c27;
    --gold:#c5a55a; --gold-warm:#d4b67a; --gold-deep:#a8884a;
    --gold-fade:rgba(197,165,90,0.12);
    --chrome:#f6f6f4; --chrome-mute:#e6e5e1; --muted:#6b7077;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Inter', system-ui, sans-serif; color:var(--ink); background:var(--chrome); }
  header.topbar {
    display:flex; align-items:center; gap:14px; padding:12px 22px; color:var(--chrome);
    background:linear-gradient(90deg, #141414, #1f1f1f);
    border-bottom:1px solid var(--ink-line); position:sticky; top:0; z-index:50;
  }
  header.topbar a.home { display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--chrome); }
  header.topbar img { height:30px; }
  header.topbar .wordmark { font-family:'Source Serif 4', Georgia, serif; font-size:14px; font-weight:700; letter-spacing:1.5px; }
  header.topbar .wordmark .light { color:var(--gold); }
  header.topbar .module {
    font-size:11px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--gold-warm);
    border-left:1px solid rgba(255,255,255,0.18); padding-left:14px; margin-left:4px;
  }

  .page { max-width:1100px; margin:0 auto; padding:22px 22px 70px; }

  /* Greeting hero */
  .hero {
    background:linear-gradient(160deg, #1f1f1f 0%, #1a1a1a 100%);
    color:var(--chrome); border:1px solid var(--ink-line); border-radius:14px;
    padding:24px 26px; margin-bottom:14px;
    display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  .hero .who h1 {
    font-family:'Source Serif 4', Georgia, serif; font-size:24px; margin:0 0 4px;
  }
  .hero .who .date { color:rgba(255,255,255,0.65); font-size:13px; }
  .hero .clock { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .hero .clock .timer { color:var(--gold-warm); font-family:ui-monospace, monospace; font-size:14px; padding:8px 12px; border:1px solid rgba(168,136,74,0.35); border-radius:8px; min-width:120px; text-align:center; }
  .hero button {
    min-height:38px; padding:0 16px; border-radius:8px; border:0;
    font:inherit; font-weight:700; font-size:13px; cursor:pointer;
  }
  .hero button.start { background:var(--gold); color:var(--ink); }
  .hero button.start:hover { background:var(--gold-warm); }
  .hero button.stop  { background:#6a1c1c; color:#fff; }
  .hero button.stop:hover { background:#5c1a1a; }

  /* Card grid */
  .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:14px; margin-bottom:14px; }
  @media (max-width:900px) { .grid { grid-template-columns:1fr; } }

  .card {
    background:#fff; border:1px solid var(--chrome-mute); border-radius:12px; padding:18px;
  }
  .card h3 {
    font-family:'Source Serif 4', Georgia, serif; font-size:16px; margin:0 0 10px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .card h3 .count { font-family:'Inter', sans-serif; font-size:11px; color:var(--muted); font-weight:600; }

  .session-list { display:flex; flex-direction:column; gap:8px; }
  .session-list a {
    display:block; padding:10px 12px; text-decoration:none; color:var(--ink);
    background:var(--gold-fade); border-left:3px solid var(--gold); border-radius:6px;
    font-size:13px; transition:background 0.12s;
  }
  .session-list a:hover { background:rgba(168,136,74,0.20); }
  .session-list .time { font-weight:700; font-size:12.5px; color:var(--ink); }
  .session-list .title { margin-top:2px; }
  .session-list .who { font-size:11.5px; color:var(--muted); margin-top:2px; }
  .empty-mini { color:var(--muted); font-size:13px; font-style:italic; padding:14px 4px; }

  .quick-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .quick-actions a {
    background:var(--chrome); border:1px solid var(--chrome-mute); border-radius:8px;
    padding:12px; text-decoration:none; color:var(--ink); font-size:13px; font-weight:600;
    display:flex; flex-direction:column; gap:2px;
  }
  .quick-actions a:hover { background:var(--gold-fade); border-color:var(--gold); }
  .quick-actions .sub { font-size:11px; color:var(--muted); font-weight:500; }

  /* Daily log */
  .log-card { background:#fff; border:1px solid var(--chrome-mute); border-radius:12px; padding:18px; }
  .log-card h3 { font-family:'Source Serif 4', Georgia, serif; font-size:16px; margin:0 0 10px; }
  .log-card label { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-top:10px; margin-bottom:4px; }
  .log-card textarea {
    width:100%; min-height:60px; padding:10px 12px; border:1px solid var(--chrome-mute);
    border-radius:8px; font:inherit; font-size:13.5px; color:var(--ink); resize:vertical;
  }
  .log-card textarea:focus { outline:2px solid var(--gold); outline-offset:-1px; border-color:var(--gold); }
  .log-card .row { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }
  .log-card button {
    min-height:38px; padding:0 14px; border-radius:8px; border:0; cursor:pointer;
    font:inherit; font-weight:700; font-size:13px; background:var(--gold); color:#fff;
  }
  .log-card button:hover { background:var(--gold-deep); }
  .log-card .saved-at { font-size:11.5px; color:var(--muted); }

  .kpi { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .kpi span {
    background:var(--gold-fade); color:var(--gold-deep);
    padding:3px 9px; border-radius:999px; font-size:11px; font-weight:700;
    text-transform:uppercase; letter-spacing:0.8px;
  }
</style>
<script src="bcc-api.js" defer></script>
</head>
<body>
<header class="topbar">
  <a class="home" href="index.html">
    <img src="bcc-logo.png" alt="Blue Collar Coach" />
    <span class="wordmark">BLUE COLLAR <span class="light">COACH</span></span>
  </a>
  <span class="module">My Day</span>
  <span style="flex:1;"></span>
</header>

<div class="page">

  <!-- Hero greeting + clock-in/out -->
  <section class="hero">
    <div class="who">
      <h1 id="greeting">Good morning.</h1>
      <div class="date" id="today"></div>
      <div class="kpi" id="kpi"></div>
    </div>
    <div class="clock">
      <div class="timer" id="timer">Off the clock</div>
      <button class="start" id="clockBtn" type="button">Clock in</button>
    </div>
  </section>

  <!-- Sessions today / tomorrow / quick actions -->
  <div class="grid">
    <div class="card">
      <h3>Today's sessions <span class="count" id="todayCount"></span></h3>
      <div class="session-list" id="todayList"></div>
    </div>
    <div class="card">
      <h3>Tomorrow <span class="count" id="tomorrowCount"></span></h3>
      <div class="session-list" id="tomorrowList"></div>
    </div>
    <div class="card">
      <h3>Quick actions</h3>
      <div class="quick-actions">
        <a href="sessions.html"><span>New session</span><span class="sub">Open calendar</span></a>
        <a href="crm.html"><span>New contact</span><span class="sub">Open CRM</span></a>
        <a href="chat.html"><span>Team chat</span><span class="sub">Channels</span></a>
        <a href="documents.html"><span>Documents</span><span class="sub">Upload files</span></a>
      </div>
    </div>
  </div>

  <!-- Daily log -->
  <section class="log-card" id="logCard">
    <h3>Daily log <span class="saved-at" id="savedAt"></span></h3>
    <label for="logWins">Wins</label>
    <textarea id="logWins" rows="2" placeholder="What moved forward today?"></textarea>
    <label for="logBlockers">Blockers</label>
    <textarea id="logBlockers" rows="2" placeholder="Anything in the way?"></textarea>
    <label for="logTomorrow">Tomorrow's plan</label>
    <textarea id="logTomorrow" rows="2" placeholder="Top 3 things for tomorrow."></textarea>
    <div class="row">
      <button id="saveLogBtn" type="button">Save log</button>
    </div>
  </section>
</div>

<script>
(function () {
  var SESSION_PREFIX = 'bcc-session-';
  var CONTACT_PREFIX = 'bcc-contact-';

  function nowIso() { return new Date().toISOString(); }
  function esc(s)   { return String(s == null ? '' : s).replace(/[<>&"']/g, function (c) { return ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]); }); }
  function ymd(d)   { var pad = function (n) { return String(n).padStart(2,'0'); }; return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }

  function meUpn() { return ((window.bccUser && window.bccUser.userDetails) || '').toLowerCase(); }
  function myFirstName() {
    var who = (window.bccUser && window.bccUser.userDetails) || '';
    var label = who;
    var full = (window.bccPeopleFull || []).find(function (p) {
      return (p.upn || '').toLowerCase() === who.toLowerCase() || (p.mail || '').toLowerCase() === who.toLowerCase();
    });
    if (full && full.displayName) label = full.displayName;
    return String(label).trim().split(/\s+/)[0] || 'there';
  }

  function allSessions() {
    var out = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i); if (!k || k.indexOf(SESSION_PREFIX) !== 0) continue;
      try { var s = JSON.parse(localStorage.getItem(k)); if (s && s.id) out.push(s); } catch (e) {}
    }
    return out;
  }
  function contactById(id) { try { return JSON.parse(localStorage.getItem(id) || 'null'); } catch (e) { return null; } }
  function contactName(c) {
    if (!c) return '';
    return ((c.firstName || '') + ' ' + (c.lastName || '')).trim() || c.email || c.company || '(no name)';
  }

  function sessionsBetween(start, end) {
    return allSessions()
      .filter(function (s) {
        var t = new Date(s.startAt).getTime();
        return !isNaN(t) && t >= start && t < end;
      })
      .sort(function (a, b) { return new Date(a.startAt) - new Date(b.startAt); });
  }

  function renderHero() {
    var hour = new Date().getHours();
    var greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greeting').textContent = greet + ', ' + myFirstName() + '.';
    document.getElementById('today').textContent = new Date().toLocaleDateString([], { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  }

  function renderKpis() {
    var t = new Date(); t.setHours(0,0,0,0);
    var todayStart = t.getTime();
    var todayEnd = todayStart + 24*60*60*1000;
    var tomorrowEnd = todayEnd + 24*60*60*1000;
    var todayCount = sessionsBetween(todayStart, todayEnd).length;
    var tomorrowCount = sessionsBetween(todayEnd, tomorrowEnd).length;
    var contactCount = 0;
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i); if (k && k.indexOf(CONTACT_PREFIX) === 0) contactCount++;
    }
    var kpi = document.getElementById('kpi');
    kpi.innerHTML =
      '<span>' + todayCount + ' session' + (todayCount === 1 ? '' : 's') + ' today</span>' +
      '<span>' + tomorrowCount + ' tomorrow</span>' +
      '<span>' + contactCount + ' contact' + (contactCount === 1 ? '' : 's') + '</span>';
  }

  function renderSessionList(sessions, listEl, countEl, emptyMsg) {
    countEl.textContent = sessions.length + ' total';
    if (sessions.length === 0) {
      listEl.innerHTML = '<div class="empty-mini">' + esc(emptyMsg) + '</div>';
      return;
    }
    listEl.innerHTML = sessions.map(function (s) {
      var t = new Date(s.startAt);
      var time = t.toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
      var contact = s.contactId ? contactName(contactById(s.contactId)) : '';
      return '<a href="sessions.html">' +
        '<div class="time">' + esc(time) + '</div>' +
        '<div class="title">' + esc(s.title || '(untitled session)') + '</div>' +
        (contact ? '<div class="who">with ' + esc(contact) + '</div>' : '') +
      '</a>';
    }).join('');
  }
  function renderSessions() {
    var t = new Date(); t.setHours(0,0,0,0);
    var todayStart = t.getTime();
    var todayEnd = todayStart + 24*60*60*1000;
    var tomorrowEnd = todayEnd + 24*60*60*1000;
    renderSessionList(sessionsBetween(todayStart, todayEnd), document.getElementById('todayList'), document.getElementById('todayCount'), 'No sessions today. Enjoy the breathing room.');
    renderSessionList(sessionsBetween(todayEnd, tomorrowEnd), document.getElementById('tomorrowList'), document.getElementById('tomorrowCount'), 'Nothing on the books for tomorrow.');
  }

  /* ===== Clock in / out ===== */
  function todayKey() { return 'bcc-daily-log-' + (meUpn() || 'anon') + '-' + ymd(new Date()); }
  function loadTodayLog() {
    try { return JSON.parse(localStorage.getItem(todayKey()) || 'null'); } catch (e) { return null; }
  }
  function saveTodayLog(log) {
    log.id = todayKey();
    log.tenantId = 'blue-collar-coach';
    log.docType = 'daily-log';
    log.userUpn = meUpn();
    log.day = ymd(new Date());
    log.updatedAt = nowIso();
    if (!log.createdAt) log.createdAt = log.updatedAt;
    localStorage.setItem(log.id, JSON.stringify(log));
  }

  var timerInt = null;
  function renderClock() {
    var log = loadTodayLog() || {};
    var btn = document.getElementById('clockBtn');
    var timerEl = document.getElementById('timer');
    if (log.clockedInAt && !log.clockedOutAt) {
      btn.textContent = 'Clock out'; btn.className = 'stop';
      function tick() {
        var elapsed = Date.now() - new Date(log.clockedInAt).getTime();
        var h = Math.floor(elapsed / 3600000);
        var m = Math.floor((elapsed % 3600000) / 60000);
        var s = Math.floor((elapsed % 60000) / 1000);
        timerEl.textContent = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
      }
      tick();
      if (timerInt) clearInterval(timerInt);
      timerInt = setInterval(tick, 1000);
    } else if (log.clockedOutAt) {
      btn.textContent = 'Clock in again'; btn.className = 'start';
      var dur = new Date(log.clockedOutAt) - new Date(log.clockedInAt);
      var h = Math.floor(dur / 3600000); var m = Math.floor((dur % 3600000) / 60000);
      timerEl.textContent = h + 'h ' + m + 'm worked';
      if (timerInt) { clearInterval(timerInt); timerInt = null; }
    } else {
      btn.textContent = 'Clock in'; btn.className = 'start';
      timerEl.textContent = 'Off the clock';
      if (timerInt) { clearInterval(timerInt); timerInt = null; }
    }
  }
  document.getElementById('clockBtn').addEventListener('click', function () {
    var log = loadTodayLog() || {};
    if (log.clockedInAt && !log.clockedOutAt) {
      log.clockedOutAt = nowIso();
      saveTodayLog(log);
      if (window.bccAudit) window.bccAudit('clock-out', { path: '/myday.html' });
      if (window.bccNotifySaved) window.bccNotifySaved('Clocked out.');
    } else {
      log.clockedInAt = nowIso();
      log.clockedOutAt = null;
      saveTodayLog(log);
      if (window.bccAudit) window.bccAudit('clock-in', { path: '/myday.html' });
      if (window.bccNotifySaved) window.bccNotifySaved('Clocked in.');
    }
    renderClock();
  });

  /* ===== Daily log notes ===== */
  function renderLog() {
    var log = loadTodayLog() || {};
    document.getElementById('logWins').value = log.wins || '';
    document.getElementById('logBlockers').value = log.blockers || '';
    document.getElementById('logTomorrow').value = log.tomorrow || '';
    document.getElementById('savedAt').textContent = log.updatedAt ? '· last saved ' + new Date(log.updatedAt).toLocaleTimeString([], { hour:'numeric', minute:'2-digit' }) : '';
  }
  document.getElementById('saveLogBtn').addEventListener('click', function () {
    var log = loadTodayLog() || {};
    log.wins     = document.getElementById('logWins').value.trim();
    log.blockers = document.getElementById('logBlockers').value.trim();
    log.tomorrow = document.getElementById('logTomorrow').value.trim();
    saveTodayLog(log);
    if (window.bccAudit) window.bccAudit('daily-log-save', { path: '/myday.html' });
    if (window.bccNotifySaved) window.bccNotifySaved('Daily log saved.');
    renderLog();
  });

  /* ===== Init ===== */
  function init() {
    renderHero();
    renderKpis();
    renderSessions();
    renderClock();
    renderLog();
  }
  window.addEventListener('bcc-data-ready', init);
  window.addEventListener('bcc-users-ready', renderHero);
  window.addEventListener('bcc-auth-ready', function () { document.body.dataset.didInit = '1'; init(); });
  setTimeout(function () { if (!document.body.dataset.didInit) { document.body.dataset.didInit = '1'; init(); } }, 600);
})();
</script>
</body>
</html>
