<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#1a1a1a" />
<meta name="robots" content="noindex, nofollow" />
<title>Engagements · BCC Connect</title>
<link rel="icon" type="image/png" href="bcc-logo.png" />
<link rel="manifest" href="manifest.json" />
<style>
  :root {
    --ink:#1a1a1a; --ink-soft:#2b2b2b; --ink-line:#2e2c27;
    --gold:#a8884a; --gold-warm:#c2a05c; --gold-deep:#876d3a;
    --gold-fade:rgba(168,136,74,0.12);
    --chrome:#f6f6f4; --chrome-mute:#e2e1dd; --muted:#8a877e;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Inter', system-ui, sans-serif; color:var(--ink); background:var(--chrome); }
  header.topbar {
    display:flex; align-items:center; gap:14px; padding:12px 22px; color:var(--chrome);
    background:linear-gradient(90deg, #141414, #1f1f1f);
    border-bottom:1px solid var(--ink-line); position:sticky; top:0; z-index:50;
  }
  header.topbar a.home { display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--chrome); }
  header.topbar img { height:30px; }
  header.topbar .wordmark { font-family:'Cinzel', serif; font-size:14px; font-weight:700; letter-spacing:1.5px; }
  header.topbar .wordmark .light { color:var(--gold); }
  header.topbar .module {
    font-size:11px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--gold-warm);
    border-left:1px solid rgba(255,255,255,0.18); padding-left:14px; margin-left:4px;
  }
  .page { max-width:1400px; margin:0 auto; padding:18px 18px 70px; }
  .page-head { display:flex; align-items:flex-end; justify-content:space-between; gap:14px; margin-bottom:14px; flex-wrap:wrap; }
  .page-head h1 { font-family:'Cinzel', serif; font-size:26px; margin:0; }
  .page-head .sub { color:var(--muted); font-size:13px; margin-top:4px; }
  .btn { min-height:38px; border:0; border-radius:8px; padding:0 14px; font:inherit; font-weight:700; font-size:13px; cursor:pointer; }
  .btn-primary { background:var(--gold); color:#fff; }
  .btn-primary:hover { background:var(--gold-deep); }
  .btn-ghost { background:transparent; color:var(--ink); border:1px solid var(--chrome-mute); }
  .btn-ghost:hover { background:var(--chrome-mute); }
  .btn-danger { background:transparent; color:#6a1c1c; border:1px solid #e6c8c8; }
  .btn-danger:hover { background:#f3e0e0; }

  /* Kanban board */
  .board {
    display:grid; grid-template-columns:repeat(6, minmax(220px, 1fr)); gap:12px;
    overflow-x:auto; padding-bottom:8px;
  }
  .col {
    background:#fff; border:1px solid var(--chrome-mute); border-radius:12px; min-height:340px;
    display:flex; flex-direction:column;
  }
  .col-head {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 14px; border-bottom:1px solid var(--chrome-mute);
    font-family:'Cinzel', serif; font-size:14px; font-weight:700;
  }
  .col-head .count {
    font-family:'Inter', sans-serif; font-size:11px; font-weight:700;
    color:var(--muted); background:var(--chrome); padding:2px 8px; border-radius:999px;
  }
  .col-body { padding:10px; display:flex; flex-direction:column; gap:8px; flex:1; }
  .col.dragover .col-body { background:var(--gold-fade); border-radius:0 0 12px 12px; }
  .card {
    background:#fdfcfa; border:1px solid var(--chrome-mute); border-left:3px solid var(--gold);
    border-radius:8px; padding:11px 12px; cursor:grab; transition:box-shadow 0.12s, transform 0.12s;
  }
  .card:hover { box-shadow:0 8px 18px rgba(0,0,0,0.06); }
  .card.dragging { opacity:0.55; cursor:grabbing; }
  .card .title { font-weight:700; font-size:13.5px; color:var(--ink); line-height:1.3; }
  .card .who   { font-size:12px; color:var(--muted); margin-top:3px; }
  .card .foot  { display:flex; align-items:center; justify-content:space-between; margin-top:8px; }
  .card .val   { font-family:'Cinzel', serif; font-size:13px; color:var(--gold-deep); font-weight:700; }
  .card .renew { font-size:10.5px; color:var(--muted); }
  .empty-col { color:var(--muted); font-size:12px; font-style:italic; text-align:center; padding:20px 6px; }

  /* Edit modal */
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; display:none; align-items:center; justify-content:center; padding:18px; }
  .modal-bg.open { display:flex; }
  .modal { background:#fff; border-radius:14px; padding:22px; max-width:560px; width:100%; max-height:90vh; overflow-y:auto; }
  .modal h3 { font-family:'Cinzel', serif; font-size:18px; margin:0 0 14px; }
  .modal label { display:flex; flex-direction:column; gap:4px; font-size:12px; font-weight:600; color:var(--muted); }
  .modal input, .modal select, .modal textarea {
    border:1px solid var(--chrome-mute); border-radius:8px; padding:9px 11px; font:inherit; font-size:14px;
    min-height:38px; color:var(--ink); background:#fff; width:100%;
  }
  .modal textarea { min-height:60px; resize:vertical; }
  .modal .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .modal .full { grid-column:1 / -1; }
  .modal .actions { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; flex-wrap:wrap; }

  @media (max-width:1100px) { .board { grid-template-columns:repeat(3, minmax(220px, 1fr)); } }
  @media (max-width:600px) {
    .board { grid-template-columns:1fr; }
    .page-head h1 { font-size:22px; }
    .page { padding:14px 14px 60px; }
    .modal .grid { grid-template-columns:1fr; }
  }
</style>
<script src="bcc-api.js" defer></script>
</head>
<body>
<header class="topbar">
  <a class="home" href="index.html">
    <img src="bcc-logo.png" alt="Blue Collar Coach" />
    <span class="wordmark">BLUE COLLAR <span class="light">COACH</span></span>
  </a>
  <span class="module">Engagements</span>
  <span style="flex:1;"></span>
</header>

<div class="page">
  <div class="page-head">
    <div>
      <h1>Engagements</h1>
      <div class="sub" id="subline">Coaching engagements, deals, and renewals across the pipeline. Drag cards between columns to update stage.</div>
    </div>
    <button class="btn btn-primary" id="newBtn" type="button">+ New engagement</button>
  </div>

  <div class="board" id="board"></div>
</div>

<!-- Edit/new modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">New engagement</h3>
    <input type="hidden" id="m-id" />
    <div class="grid">
      <label class="full">Title<input type="text" id="m-title" placeholder="Acme Co. — quarterly retainer" /></label>
      <label>Stage
        <select id="m-stage">
          <option value="new">New</option>
          <option value="scheduled">Scheduled</option>
          <option value="active">Active</option>
          <option value="waiting">Waiting</option>
          <option value="invoiced">Invoiced</option>
          <option value="done">Done</option>
        </select>
      </label>
      <label>Owner
        <select id="m-owner"><option value="">— Me —</option></select>
      </label>
      <label>Linked contact
        <select id="m-contact"><option value="">— None —</option></select>
      </label>
      <label>Service type
        <select id="m-type"></select>
      </label>
      <label>Value (USD)<input type="number" id="m-value" min="0" step="50" placeholder="2500" /></label>
      <label>Start date<input type="date" id="m-start" /></label>
      <label>Renew / close date<input type="date" id="m-renew" /></label>
      <label class="full">Notes<textarea id="m-notes" rows="3" placeholder="Scope, milestones, anything to remember"></textarea></label>
    </div>
    <div class="actions">
      <button class="btn btn-ghost" id="m-cancel" type="button">Cancel</button>
      <button class="btn btn-danger" id="m-delete" type="button" style="display:none;">Delete</button>
      <button class="btn btn-primary" id="m-save" type="button">Save</button>
    </div>
  </div>
</div>

<script>
(function () {
  var ENG_PREFIX = 'bcc-engagement-';
  var CONTACT_PREFIX = 'bcc-contact-';
  var TYPES_KEY = 'bcc-customer-types-v1';

  var STAGES = [
    { id: 'new',       label: 'New' },
    { id: 'scheduled', label: 'Scheduled' },
    { id: 'active',    label: 'Active' },
    { id: 'waiting',   label: 'Waiting' },
    { id: 'invoiced',  label: 'Invoiced' },
    { id: 'done',      label: 'Done' }
  ];

  function uid()    { return 'e' + Date.now().toString(36) + Math.random().toString(36).slice(2,9); }
  function nowIso() { return new Date().toISOString(); }
  function esc(s)   { return String(s == null ? '' : s).replace(/[<>&"']/g, function (c) { return ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]); }); }
  function dollars(c) { return '$' + Math.round((c || 0) / 100).toLocaleString(); }

  function allEngagements() {
    var out = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i); if (!k || k.indexOf(ENG_PREFIX) !== 0) continue;
      try { var e = JSON.parse(localStorage.getItem(k)); if (e && e.id) out.push(e); } catch (_) {}
    }
    return out;
  }
  function getEng(id) { try { return JSON.parse(localStorage.getItem(id) || 'null'); } catch (e) { return null; } }
  function saveEng(e) {
    e.updatedAt = nowIso();
    if (!e.createdAt) e.createdAt = e.updatedAt;
    if (!e.id) e.id = ENG_PREFIX + uid();
    if (!e.tenantId) e.tenantId = 'blue-collar-coach';
    e.docType = 'engagement';
    localStorage.setItem(e.id, JSON.stringify(e));
    return e;
  }
  function delEng(id) { localStorage.removeItem(id); }

  function allContacts() {
    var out = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i); if (!k || k.indexOf(CONTACT_PREFIX) !== 0) continue;
      try { var c = JSON.parse(localStorage.getItem(k)); if (c && c.id) out.push(c); } catch (_) {}
    }
    return out.sort(function (a, b) {
      var an = ((a.firstName || '') + ' ' + (a.lastName || '')).trim();
      var bn = ((b.firstName || '') + ' ' + (b.lastName || '')).trim();
      return an.localeCompare(bn);
    });
  }
  function contactById(id) { try { return JSON.parse(localStorage.getItem(id) || 'null'); } catch (_) { return null; } }
  function contactName(c) { if (!c) return ''; return ((c.firstName || '') + ' ' + (c.lastName || '')).trim() || c.email || c.company || '(no name)'; }

  function loadServiceTypes() {
    try { var raw = localStorage.getItem(TYPES_KEY); if (raw) { var d = JSON.parse(raw); if (d && d.types) return d.types; } } catch (_) {}
    return [
      { id: 'coaching',    label: 'Coaching' }, { id: 'bookkeeping', label: 'Bookkeeping' },
      { id: 'consulting',  label: 'Consulting' }, { id: 'marketing',   label: 'Marketing' },
      { id: 'training',    label: 'Training' }, { id: 'technology',  label: 'Technology' },
      { id: 'other',       label: 'Other' }
    ];
  }

  /* ===== Board render ===== */
  function renderBoard() {
    var all = allEngagements();
    var byStage = {};
    STAGES.forEach(function (s) { byStage[s.id] = []; });
    all.forEach(function (e) { var s = e.stage || 'new'; if (!byStage[s]) byStage[s] = []; byStage[s].push(e); });

    var html = '';
    STAGES.forEach(function (s) {
      var items = (byStage[s.id] || []).sort(function (a, b) { return (b.updatedAt || '').localeCompare(a.updatedAt || ''); });
      html += '<div class="col" data-stage="' + esc(s.id) + '">' +
        '<div class="col-head">' + esc(s.label) + '<span class="count">' + items.length + '</span></div>' +
        '<div class="col-body">';
      if (items.length === 0) {
        html += '<div class="empty-col">Drop here</div>';
      } else {
        items.forEach(function (e) {
          var c = e.contactId ? contactById(e.contactId) : null;
          var who = c ? contactName(c) : '';
          var renew = e.renewAt ? new Date(e.renewAt).toLocaleDateString([], { month:'short', day:'numeric' }) : '';
          html += '<div class="card" draggable="true" data-id="' + esc(e.id) + '">' +
            '<div class="title">' + esc(e.title || '(untitled)') + '</div>' +
            (who ? '<div class="who">' + esc(who) + '</div>' : '') +
            '<div class="foot">' +
              '<span class="val">' + (e.valueCents ? dollars(e.valueCents) : '—') + '</span>' +
              (renew ? '<span class="renew">' + esc(renew) + '</span>' : '') +
            '</div>' +
          '</div>';
        });
      }
      html += '</div></div>';
    });
    document.getElementById('board').innerHTML = html;
    wireBoardEvents();
  }

  function wireBoardEvents() {
    var dragged = null;
    document.querySelectorAll('.card[draggable]').forEach(function (card) {
      card.addEventListener('dragstart', function (e) {
        dragged = card.dataset.id;
        card.classList.add('dragging');
        try { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', dragged); } catch (_) {}
      });
      card.addEventListener('dragend', function () { card.classList.remove('dragging'); dragged = null; });
      card.addEventListener('click', function () { openModal(card.dataset.id); });
    });
    document.querySelectorAll('.col').forEach(function (col) {
      col.addEventListener('dragover', function (e) { e.preventDefault(); col.classList.add('dragover'); });
      col.addEventListener('dragleave', function () { col.classList.remove('dragover'); });
      col.addEventListener('drop', function (e) {
        e.preventDefault(); col.classList.remove('dragover');
        var id = dragged || (e.dataTransfer && e.dataTransfer.getData('text/plain'));
        if (!id) return;
        var rec = getEng(id); if (!rec) return;
        var newStage = col.dataset.stage;
        if (rec.stage !== newStage) {
          var oldStage = rec.stage;
          rec.stage = newStage;
          saveEng(rec);
          if (window.bccAudit) window.bccAudit('engagement-stage', { key: rec.id, path: '/jobs.html', meta: { from: oldStage, stage: newStage } });
          renderBoard();
        }
      });
    });
  }

  /* ===== Modal ===== */
  function populateContactDropdown(selected) {
    var sel = document.getElementById('m-contact');
    var contacts = allContacts();
    sel.innerHTML = '<option value="">— None —</option>' +
      contacts.map(function (c) {
        return '<option value="' + esc(c.id) + '"' + (c.id === selected ? ' selected' : '') + '>' + esc(contactName(c)) + (c.company ? ' (' + esc(c.company) + ')' : '') + '</option>';
      }).join('');
  }
  function populateTypeDropdown(selected) {
    var sel = document.getElementById('m-type');
    var types = loadServiceTypes();
    sel.innerHTML = types.map(function (t) {
      return '<option value="' + esc(t.id) + '"' + (t.id === selected ? ' selected' : '') + '>' + esc(t.label) + '</option>';
    }).join('');
  }
  function populateOwnerDropdown(selected) {
    var sel = document.getElementById('m-owner');
    var people = (window.bccPeopleFull || []);
    var me = (window.bccUser && window.bccUser.userDetails) || '';
    sel.innerHTML = '<option value="">— Me (' + esc(me || 'signed-in user') + ') —</option>' +
      people.map(function (p) {
        var upn = p.upn || p.mail || '';
        return '<option value="' + esc(upn) + '"' + (upn === selected ? ' selected' : '') + '>' + esc(p.displayName || upn) + '</option>';
      }).join('');
  }

  function openModal(id) {
    document.getElementById('m-id').value = id || '';
    var e = id ? getEng(id) : null;
    document.getElementById('modalTitle').textContent = id ? 'Edit engagement' : 'New engagement';
    document.getElementById('m-delete').style.display = id ? '' : 'none';
    document.getElementById('m-title').value = (e && e.title) || '';
    document.getElementById('m-stage').value = (e && e.stage) || 'new';
    document.getElementById('m-value').value = e && e.valueCents ? (e.valueCents / 100) : '';
    document.getElementById('m-start').value = (e && e.startAt) ? e.startAt.slice(0,10) : '';
    document.getElementById('m-renew').value = (e && e.renewAt) ? e.renewAt.slice(0,10) : '';
    document.getElementById('m-notes').value = (e && e.notes) || '';
    populateContactDropdown((e && e.contactId) || '');
    populateTypeDropdown((e && e.serviceType) || 'coaching');
    populateOwnerDropdown((e && e.ownerUpn) || '');
    document.getElementById('modalBg').classList.add('open');
    setTimeout(function () { document.getElementById('m-title').focus(); }, 50);
  }
  function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

  document.getElementById('newBtn').addEventListener('click', function () { openModal(null); });
  document.getElementById('m-cancel').addEventListener('click', closeModal);
  document.getElementById('modalBg').addEventListener('click', function (e) { if (e.target.id === 'modalBg') closeModal(); });

  document.getElementById('m-save').addEventListener('click', function () {
    var id = document.getElementById('m-id').value;
    var rec = id ? (getEng(id) || {}) : {};
    rec.title       = document.getElementById('m-title').value.trim() || '(untitled)';
    rec.stage       = document.getElementById('m-stage').value;
    rec.ownerUpn    = document.getElementById('m-owner').value || (window.bccUser && window.bccUser.userDetails) || '';
    rec.contactId   = document.getElementById('m-contact').value || null;
    rec.serviceType = document.getElementById('m-type').value;
    rec.valueCents  = Math.round(parseFloat(document.getElementById('m-value').value || '0') * 100) || 0;
    rec.startAt     = document.getElementById('m-start').value || null;
    rec.renewAt     = document.getElementById('m-renew').value || null;
    rec.notes       = document.getElementById('m-notes').value.trim();
    saveEng(rec);
    if (window.bccAudit) window.bccAudit(id ? 'engagement-update' : 'engagement-create', { key: rec.id, path: '/jobs.html', meta: { stage: rec.stage, type: rec.serviceType } });
    if (window.bccNotifySaved) window.bccNotifySaved('Engagement saved.');
    closeModal();
    renderBoard();
  });
  document.getElementById('m-delete').addEventListener('click', function () {
    var id = document.getElementById('m-id').value; if (!id) return;
    if (!confirm('Delete this engagement?')) return;
    delEng(id);
    if (window.bccAudit) window.bccAudit('engagement-delete', { key: id, path: '/jobs.html' });
    closeModal();
    renderBoard();
  });

  /* ===== Init ===== */
  function init() { renderBoard(); }
  window.addEventListener('bcc-data-ready', renderBoard);
  window.addEventListener('bcc-auth-ready', function () { document.body.dataset.didInit = '1'; init(); });
  setTimeout(function () { if (!document.body.dataset.didInit) { document.body.dataset.didInit = '1'; init(); } }, 600);
})();
</script>
</body>
</html>
