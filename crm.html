<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#1a1a1a" />
<meta name="robots" content="noindex, nofollow" />
<title>CRM · BCC Connect</title>
<link rel="icon" type="image/png" href="bcc-logo.png" />
<link rel="manifest" href="manifest.json" />
<style>
  :root {
    --ink:        #1a1a1a;
    --ink-soft:   #2b2b2b;
    --ink-line:   #2e2c27;
    --gold:#c5a55a;
    --gold-warm:#d4b67a;
    --gold-deep:#a8884a;
    --gold-fade:rgba(197,165,90,0.12);
    --chrome:     #f6f6f4;
    --chrome-mute:#e6e5e1;
    --muted:#6b7077;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Arial, sans-serif;
    color: var(--ink);
    background: var(--chrome);
    -webkit-font-smoothing: antialiased;
  }

  header.topbar {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 22px; color: var(--chrome);
    background: linear-gradient(90deg, #141414 0%, #1f1f1f 100%);
    border-bottom: 1px solid var(--ink-line);
    position: sticky; top: 0; z-index: 50;
  }
  header.topbar a.home { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--chrome); }
  header.topbar img { height: 30px; }
  header.topbar .wordmark { font-family: 'Source Serif 4', Georgia, serif; font-size: 14px; font-weight: 700; letter-spacing: 1.5px; }
  header.topbar .wordmark .light { color: var(--gold); }
  header.topbar .module {
    font-size: 11px; font-weight: 700; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--gold-warm);
    border-left: 1px solid rgba(255,255,255,0.18);
    padding-left: 14px; margin-left: 4px;
  }

  .page { max-width: 1200px; margin: 0 auto; padding: 22px 22px 70px; }
  .crm-tabs {
    display: flex; gap: 4px; flex-wrap: wrap;
    background: #fff; border: 1px solid var(--chrome-mute); border-radius: 12px;
    padding: 6px; margin-bottom: 14px;
  }
  .crm-tabs a {
    flex: 1; min-width: 120px; min-height: 38px;
    background: transparent; border: 0; border-radius: 8px;
    font: inherit; font-size: 13px; font-weight: 700; color: var(--muted);
    cursor: pointer; padding: 9px 12px; letter-spacing: 0.2px;
    text-decoration: none; text-align: center;
  }
  .crm-tabs a:hover { background: var(--chrome); color: var(--ink); }
  .crm-tabs a.active { background: var(--ink); color: var(--gold-warm); }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
  .page-head h1 {
    font-family: 'Source Serif 4', Georgia, serif; font-size: 26px; font-weight: 700;
    letter-spacing: 0.4px; margin: 0; color: var(--ink);
  }
  .page-head .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .page-head .meta { font-size: 12px; color: var(--muted); }

  .toolbar {
    display: flex; align-items: center; gap: 8px;
    background: #fff; padding: 12px; border: 1px solid var(--chrome-mute);
    border-radius: 12px; margin-bottom: 14px; flex-wrap: wrap;
  }
  .toolbar .search { flex: 1; min-width: 200px; display: flex; align-items: center; gap: 8px;
    background: var(--chrome); border: 1px solid var(--chrome-mute); border-radius: 8px;
    padding: 8px 12px; min-height: 38px; }
  .toolbar .search input { flex: 1; border: none; outline: none; background: transparent; font: inherit; font-size: 14px; min-width: 0; }
  .toolbar .search svg { width: 16px; height: 16px; opacity: 0.6; flex-shrink: 0; }
  .toolbar select { background: var(--chrome); border: 1px solid var(--chrome-mute); border-radius: 8px; padding: 8px 10px; font: inherit; font-size: 13px; min-height: 38px; min-width: 130px; }
  .toolbar .btn { min-height: 38px; border: 0; border-radius: 8px; padding: 0 14px; font: inherit; font-weight: 700; font-size: 13px; cursor: pointer; letter-spacing: 0.2px; }
  .btn-primary { background: var(--gold); color: #fff; }
  .btn-primary:hover { background: var(--gold-deep); }
  .btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--chrome-mute); }
  .btn-ghost:hover { background: var(--chrome-mute); }
  .btn-danger { background: transparent; color: #6a1c1c; border: 1px solid #e6c8c8; }
  .btn-danger:hover { background: #f3e0e0; }

  .list { background: #fff; border: 1px solid var(--chrome-mute); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; font-size: 11px; font-weight: 700;
    color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px;
    padding: 12px 14px; border-bottom: 1px solid var(--chrome-mute); background: var(--chrome);
  }
  tbody tr { border-bottom: 1px solid var(--chrome-mute); cursor: pointer; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--gold-fade); }
  tbody td { padding: 12px 14px; vertical-align: middle; font-size: 13.5px; }
  tbody td .name { font-weight: 700; color: var(--ink); }
  tbody td .email { color: var(--gold-deep); font-size: 12.5px; }
  tbody td .muted { color: var(--muted); font-size: 12.5px; }
  tbody td.actions { text-align: right; white-space: nowrap; }
  .stage, .ctype {
    display: inline-block; font-size: 10.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    padding: 3px 9px; border-radius: 999px;
  }
  .stage.lead      { background: rgba(168,136,74,0.18); color: var(--gold-deep); }
  .stage.qualified { background: #ddeefd; color: #1d4ed8; }
  .stage.customer  { background: #d1fae5; color: #065f46; }
  .stage.inactive  { background: #f1f1ef; color: var(--muted); }

  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); padding: 6px 10px; border-radius: 6px;
    font-size: 14px; transition: background 0.12s, color 0.12s;
  }
  .icon-btn:hover { background: var(--chrome-mute); color: var(--ink); }
  .icon-btn.danger:hover { background: #f3e0e0; color: #6a1c1c; }

  .empty { padding: 64px 20px; text-align: center; color: var(--muted); }
  .empty .big { font-family: 'Source Serif 4', Georgia, serif; font-size: 20px; color: var(--ink); margin-bottom: 6px; }

  .panel { display: none; background: #fff; border: 1px solid var(--chrome-mute); border-radius: 12px; margin-bottom: 14px; padding: 18px; }
  .panel.open { display: block; }
  .panel h3 { margin: 0 0 12px; font-family: 'Source Serif 4', Georgia, serif; font-size: 17px; color: var(--ink); }
  .panel .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .panel label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; font-weight: 600; color: var(--muted); }
  .panel input, .panel select, .panel textarea {
    border: 1px solid var(--chrome-mute); border-radius: 8px;
    padding: 9px 11px; font: inherit; font-size: 14px; color: var(--ink); background: #fff;
    min-height: 38px;
  }
  .panel input:focus, .panel select:focus, .panel textarea:focus { outline: 2px solid var(--gold); outline-offset: -1px; border-color: var(--gold); }
  .panel textarea { min-height: 60px; resize: vertical; }
  .panel .full { grid-column: 1 / -1; }
  .panel .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

  /* ---- Detail view (mode=detail) ---- */
  .detail-head {
    background: linear-gradient(160deg, #1f1f1f 0%, #1a1a1a 100%);
    color: var(--chrome); border-radius: 14px; padding: 22px 24px;
    border: 1px solid var(--ink-line); margin-bottom: 16px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap;
  }
  .detail-head .who h2 { font-family: 'Source Serif 4', Georgia, serif; font-size: 24px; margin: 0 0 4px; color: #fff; }
  .detail-head .who .meta-line { font-size: 13px; color: rgba(255,255,255,0.65); }
  .detail-head .who .meta-line a { color: var(--gold-warm); text-decoration: none; }
  .detail-head .who .meta-line a:hover { text-decoration: underline; }
  .detail-head .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .detail-head .back { font-size: 13px; color: var(--gold-warm); text-decoration: none; }
  .detail-head .back:hover { color: #fff; }
  .detail-head .top-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .detail-grid {
    display: grid; grid-template-columns: 1fr 1.4fr; gap: 16px;
  }
  @media (max-width: 880px) { .detail-grid { grid-template-columns: 1fr; } }

  .card {
    background: #fff; border: 1px solid var(--chrome-mute); border-radius: 12px; padding: 18px;
    margin-bottom: 14px;
  }
  .card h4 {
    margin: 0 0 10px; font-family: 'Source Serif 4', Georgia, serif; font-size: 15px; color: var(--ink);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card h4 .count { font-family: 'Inter', sans-serif; font-size: 11px; color: var(--muted); font-weight: 600; }
  .card h4 .add { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--gold); cursor: pointer; font-weight: 700; background: none; border: 0; padding: 0; }
  .card h4 .add:hover { color: var(--gold-deep); }
  .field-row { display: grid; grid-template-columns: 110px 1fr; gap: 8px; padding: 6px 0; font-size: 13.5px; border-bottom: 1px dashed #f1efe9; }
  .field-row:last-child { border-bottom: none; }
  .field-row .k { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; padding-top: 4px; }
  .field-row .v { color: var(--ink); }
  .field-row .v.editable { cursor: text; }
  .field-row .v[contenteditable=true]:focus { outline: 2px solid var(--gold); outline-offset: 2px; border-radius: 4px; }

  .timeline { list-style: none; padding: 0; margin: 0; }
  .timeline li {
    padding: 10px 0; border-bottom: 1px solid #f1efe9; font-size: 13.5px;
  }
  .timeline li:last-child { border-bottom: none; }
  .timeline .when { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
  .timeline .convo-type {
    display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; padding: 2px 7px; border-radius: 999px; margin-right: 6px;
    background: var(--gold-fade); color: var(--gold-deep);
  }
  .timeline .convo-type.email { background: #ddeefd; color: #1d4ed8; }
  .timeline .convo-type.call { background: #f3e0e0; color: #6a1c1c; }
  .timeline .convo-type.session { background: #d1fae5; color: #065f46; }
  .timeline .convo-type.meeting { background: #fff4d6; color: #92400e; }
  .timeline .summary { font-weight: 600; color: var(--ink); margin-top: 2px; }
  .timeline .details { color: var(--muted); margin-top: 3px; white-space: pre-wrap; }
  .timeline .del { float: right; }

  .need-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
  .need-row input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--gold); }
  .need-row .label { flex: 1; font-size: 13.5px; color: var(--ink); }
  .need-row.met .label { text-decoration: line-through; color: var(--muted); }

  .inline-add {
    display: flex; gap: 6px; margin-top: 10px;
  }
  .inline-add input, .inline-add select, .inline-add textarea {
    flex: 1; min-height: 36px; padding: 8px 10px; font: inherit; font-size: 13.5px;
    border: 1px solid var(--chrome-mute); border-radius: 7px; background: var(--chrome);
  }
  .inline-add textarea { min-height: 60px; resize: vertical; flex-basis: 100%; }
  .inline-add button { padding: 0 14px; min-height: 36px; border: 0; border-radius: 7px; background: var(--gold); color: #fff; font-weight: 700; font-size: 12.5px; cursor: pointer; }
  .inline-add button:hover { background: var(--gold-deep); }
  .inline-add .row { display: flex; gap: 6px; width: 100%; }
  .inline-add .stacked { flex-direction: column; }

  @media (max-width: 700px) {
    .page { padding: 14px 14px 60px; }
    .page-head h1 { font-size: 22px; }
    table, thead, tbody, tr, td { display: block; }
    thead { display: none; }
    tbody tr {
      background: #fff;
      border: 1px solid var(--chrome-mute); border-radius: 10px;
      margin-bottom: 10px; padding: 12px;
    }
    tbody td { padding: 4px 0; border: none; font-size: 14px; }
    tbody td:before { content: attr(data-label); display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 2px; }
    tbody td.actions { text-align: left; padding-top: 8px; }
    .list { background: transparent; border: 0; }
    .panel .grid { grid-template-columns: 1fr; }
  }

  @media print {
    header.topbar, .crm-tabs, .toolbar, .panel, .icon-btn, .page-head .meta { display: none !important; }
    body { background: #fff; }
    .list, .card, .detail-head { box-shadow: none; border: 1px solid #ccc; }
    .detail-head { background: #fff; color: #000; }
    .detail-head .who h2, .detail-head .who .meta-line, .detail-head .who .meta-line a { color: #000; }
  }
</style>
<script src="bcc-api.js" defer></script>
</head>
<body>

<header class="topbar">
  <a class="home" href="index.html">
    <img src="bcc-logo.png" alt="Blue Collar Coach" />
    <span class="wordmark">BLUE COLLAR <span class="light">COACH</span></span>
  </a>
  <span class="module">CRM</span>
  <span style="flex:1;"></span>
</header>

<div class="page">
  <nav class="crm-tabs">
    <a href="crm.html" class="active">Contacts</a>
    <a href="crm-companies.html">Companies</a>
    <a href="jobs.html">Engagements</a>
  </nav>
  <!-- LIST MODE -->
  <div id="listMode">
    <div class="page-head">
      <div>
        <h1>Contacts</h1>
        <div class="sub" id="subline">Loading…</div>
      </div>
      <div class="meta" id="syncMeta"></div>
    </div>

    <div class="toolbar">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input id="q" type="search" placeholder="Search by name, email, company, or tag…" autocomplete="off" />
      </div>
      <select id="typeFilter" aria-label="Filter by customer type">
        <option value="">All types</option>
      </select>
      <select id="stageFilter" aria-label="Filter by stage">
        <option value="">All stages</option>
        <option value="lead">Lead</option>
        <option value="qualified">Qualified</option>
        <option value="customer">Customer</option>
        <option value="inactive">Inactive</option>
      </select>
      <select id="regionFilter" aria-label="Filter by region">
        <option value="">All regions</option>
      </select>
      <button class="btn btn-ghost" id="csvBtn" type="button">Import CSV</button>
      <button class="btn btn-ghost" id="scanBtn" type="button">📇 Scan card</button>
      <button class="btn btn-primary" id="newBtn" type="button">+ New contact</button>
    </div>

    <div class="panel" id="panel">
      <h3 id="panelTitle">New contact</h3>
      <div id="scanStatus" style="display:none;font-size:13px;margin-bottom:12px;padding:8px 12px;border-radius:8px;background:var(--chrome);"></div>
      <div class="grid">
        <label>First name<input id="f-first" type="text" required /></label>
        <label>Last name<input id="f-last" type="text" /></label>
        <label>Email<input id="f-email" type="email" /></label>
        <label>Phone<input id="f-phone" type="tel" /></label>
        <label>Title<input id="f-title" type="text" placeholder="Owner, GM, …" /></label>
        <label>Company<input id="f-company" type="text" placeholder="Acme Co." /></label>
        <div class="full" style="display:flex;flex-direction:column;gap:5px;">
          <span style="font-size:12.5px;font-weight:600;color:var(--muted);">Website</span>
          <span style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <input id="f-website" type="text" placeholder="acme.com" style="flex:1;min-width:180px;" />
            <button class="btn btn-ghost" id="enrichBtn" type="button" style="white-space:nowrap;">🔎 Enrich from website</button>
          </span>
          <span id="enrichStatus" style="font-size:12px;color:var(--muted);"></span>
        </div>
        <label>Customer type
          <select id="f-type"></select>
        </label>
        <label>Stage
          <select id="f-stage">
            <option value="lead">Lead</option>
            <option value="qualified">Qualified</option>
            <option value="customer">Customer</option>
            <option value="inactive">Inactive</option>
          </select>
        </label>
        <label class="full">Street address<input id="f-street" type="text" placeholder="123 Main St" /></label>
        <label>City<input id="f-city" type="text" /></label>
        <label>State / region<input id="f-state" type="text" placeholder="MN" /></label>
        <label>ZIP<input id="f-zip" type="text" placeholder="55101" /></label>
        <label>Business type<input id="f-industry" type="text" placeholder="HVAC contractor" /></label>
        <label>Years in business<input id="f-years" type="text" placeholder="12" /></label>
        <label>Company size<input id="f-size" type="text" placeholder="10–50" /></label>
        <label class="full">Tags<input id="f-tags" type="text" placeholder="hvac, signed, midwest" /></label>
        <label class="full">Notes<textarea id="f-notes" rows="2"></textarea></label>
      </div>
      <div class="actions">
        <button class="btn btn-ghost" id="cancelBtn" type="button">Cancel</button>
        <button class="btn btn-primary" id="saveBtn" type="button">Save contact</button>
      </div>
    </div>

    <input type="file" id="csvFile" accept=".csv,text/csv" style="display:none;" />
    <input type="file" id="cardFile" accept="image/*" multiple style="display:none;" />

    <div class="list" id="list" aria-live="polite">
      <table id="tbl">
        <thead>
          <tr>
            <th>Name</th>
            <th>Company</th>
            <th>Type</th>
            <th>Stage</th>
            <th>Location</th>
            <th>Tags</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="empty" id="empty" hidden>
        <div class="big">No contacts yet.</div>
        <div>Add your first one with the "+ New contact" button, or import a CSV.</div>
      </div>
    </div>
  </div>

  <!-- DETAIL MODE (rendered when URL has ?id=) -->
  <div id="detailMode" hidden></div>
</div>

<script>
(function () {
  /* ===== Storage model =====
   * bcc-contact-<cuid>       — one per contact
   * bcc-convo-<cuid>         — per logged interaction (call/email/session/meeting/note)
   * bcc-customer-types-v1    — admin config singleton: list of {id,label,color}
   */
  var CONTACT_PREFIX = 'bcc-contact-';
  var COMPANY_PREFIX = 'bcc-company-';
  function allCompaniesLite() {
    var out = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i); if (!k || k.indexOf(COMPANY_PREFIX) !== 0) continue;
      try { var c = JSON.parse(localStorage.getItem(k)); if (c && c.id) out.push({ id: c.id, name: c.name || '(unnamed)', industry: c.industry || '' }); } catch (_) {}
    }
    return out.sort(function (a, b) { return a.name.localeCompare(b.name); });
  }
  function buildCompanyOptions(selectedId) {
    var companies = allCompaniesLite();
    var opts = '<option value="">— None —</option>';
    companies.forEach(function (co) {
      opts += '<option value="' + esc(co.id) + '"' + (co.id === selectedId ? ' selected' : '') + '>' + esc(co.name) + (co.industry ? ' · ' + esc(co.industry) : '') + '</option>';
    });
    return opts;
  }
  var CONVO_PREFIX   = 'bcc-convo-';
  var TYPES_KEY      = 'bcc-customer-types-v1';

  // Default customer-type list used until an admin saves a custom one.
  // Mirrors what a coaching firm for blue-collar trades commonly serves.
  var DEFAULT_TYPES = {
    id: TYPES_KEY,
    tenantId: 'blue-collar-coach',
    docType: 'customer-types',
    types: [
        { id: 'coaching',    label: 'Coaching',    color: '#a8884a' },
        { id: 'bookkeeping', label: 'Bookkeeping', color: '#1d4ed8' },
        { id: 'consulting',  label: 'Consulting',  color: '#059669' },
        { id: 'marketing',   label: 'Marketing',   color: '#7c3aed' },
        { id: 'training',    label: 'Training',    color: '#d97706' },
        { id: 'technology',  label: 'Technology',  color: '#0891b2' },
        { id: 'other',       label: 'Other',       color: '#8a877e' }
      ],
      updatedAt: new Date().toISOString()
    };

  var REGION_BY_STATE = {
    AK:'West',AZ:'West',CA:'West',CO:'West',HI:'West',ID:'West',MT:'West',NV:'West',NM:'West',OR:'West',UT:'West',WA:'West',WY:'West',
    IA:'Midwest',IL:'Midwest',IN:'Midwest',KS:'Midwest',MI:'Midwest',MN:'Midwest',MO:'Midwest',ND:'Midwest',NE:'Midwest',OH:'Midwest',SD:'Midwest',WI:'Midwest',
    AL:'South',AR:'South',DC:'South',DE:'South',FL:'South',GA:'South',KY:'South',LA:'South',MD:'South',MS:'South',NC:'South',OK:'South',SC:'South',TN:'South',TX:'South',VA:'South',WV:'South',
    CT:'Northeast',MA:'Northeast',ME:'Northeast',NH:'Northeast',NJ:'Northeast',NY:'Northeast',PA:'Northeast',RI:'Northeast',VT:'Northeast'
  };

  function uid()    { return 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2, 9); }
  function nowIso() { return new Date().toISOString(); }
  function regionOf(s) { if (!s) return ''; var t = String(s).trim().toUpperCase().slice(0, 2); return REGION_BY_STATE[t] || ''; }
  function esc(s)   { return String(s == null ? '' : s).replace(/[<>&"']/g, function (c) { return ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]); }); }
  function fmtWhen(iso) {
    if (!iso) return '';
    var d = new Date(iso); if (isNaN(d)) return '';
    var now = new Date();
    var sameDay = d.toDateString() === now.toDateString();
    var sameYear = d.getFullYear() === now.getFullYear();
    if (sameDay) return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    if (sameYear) return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
    return d.toLocaleDateString([], { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function loadTypes() {
    try {
      var raw = localStorage.getItem(TYPES_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (parsed && Array.isArray(parsed.types) && parsed.types.length) return parsed.types;
      }
    } catch (e) {}
    return DEFAULT_TYPES.types;
  }
  function typeLabel(id) {
    var t = loadTypes().find(function (x) { return x.id === id; });
    return t ? t.label : '';
  }
  function typeColor(id) {
    var t = loadTypes().find(function (x) { return x.id === id; });
    return t ? t.color : '#8a877e';
  }

  function allContacts() {
    var out = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (!k || k.indexOf(CONTACT_PREFIX) !== 0) continue;
      try { var c = JSON.parse(localStorage.getItem(k)); if (c && c.id) out.push(c); } catch (e) {}
    }
    return out.sort(function (a, b) { return (b.updatedAt || '').localeCompare(a.updatedAt || ''); });
  }
  function getContact(id) {
    try { return JSON.parse(localStorage.getItem(id) || 'null'); } catch (e) { return null; }
  }
  function saveContact(c) {
    c.updatedAt = nowIso();
    if (!c.createdAt) c.createdAt = c.updatedAt;
    if (!c.id) c.id = CONTACT_PREFIX + uid();
    if (!c.tenantId) c.tenantId = 'blue-collar-coach';
    c.docType = 'contact';
    if (!Array.isArray(c.needs)) c.needs = [];
    localStorage.setItem(c.id, JSON.stringify(c));
    return c;
  }
  function deleteContact(id) {
    localStorage.removeItem(id);
    // also remove this contact's convos
    convosFor(id).forEach(function (cv) { localStorage.removeItem(cv.id); });
  }

  function convosFor(contactId) {
    var out = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (!k || k.indexOf(CONVO_PREFIX) !== 0) continue;
      try {
        var cv = JSON.parse(localStorage.getItem(k));
        if (cv && cv.contactId === contactId) out.push(cv);
      } catch (e) {}
    }
    return out.sort(function (a, b) { return (b.at || '').localeCompare(a.at || ''); });
  }
  function saveConvo(cv) {
    cv.updatedAt = nowIso();
    if (!cv.createdAt) cv.createdAt = cv.updatedAt;
    if (!cv.at) cv.at = cv.updatedAt;
    if (!cv.id) cv.id = CONVO_PREFIX + uid();
    if (!cv.tenantId) cv.tenantId = 'blue-collar-coach';
    cv.docType = 'convo';
    localStorage.setItem(cv.id, JSON.stringify(cv));
  }
  function deleteConvo(id) { localStorage.removeItem(id); }

  /* Weekly coaching notes — dated entries per contact (after weekly calls). */
  var WEEKLY_PREFIX = 'bcc-weeklynote-';
  function weeklyNotesFor(contactId) {
    var out = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (!k || k.indexOf(WEEKLY_PREFIX) !== 0) continue;
      try { var w = JSON.parse(localStorage.getItem(k)); if (w && w.contactId === contactId) out.push(w); } catch (e) {}
    }
    return out.sort(function (a, b) { return (b.weekOf || '').localeCompare(a.weekOf || '') || (b.createdAt || '').localeCompare(a.createdAt || ''); });
  }
  function saveWeeklyNote(w) {
    w.updatedAt = nowIso();
    if (!w.createdAt) w.createdAt = w.updatedAt;
    if (!w.id) w.id = WEEKLY_PREFIX + uid();
    if (!w.tenantId) w.tenantId = 'blue-collar-coach';
    w.docType = 'weekly-note';
    localStorage.setItem(w.id, JSON.stringify(w));
  }
  function deleteWeeklyNote(id) { localStorage.removeItem(id); }
  // Monday of the current week, YYYY-MM-DD (default "week of" for a new note).
  function thisMonday() {
    var d = new Date(); var day = (d.getDay() + 6) % 7; d.setDate(d.getDate() - day);
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }
  function fmtWeekOf(s) {
    if (!s) return '';
    var p = String(s).split('-'); if (p.length !== 3) return s;
    var d = new Date(+p[0], +p[1] - 1, +p[2]); if (isNaN(d)) return s;
    return 'Week of ' + d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
  }

  /* ===== Mode routing ===== */
  function getParam(k) {
    return new URLSearchParams(location.search).get(k);
  }
  function show(id) {
    document.getElementById('listMode').hidden = (id !== 'listMode');
    document.getElementById('detailMode').hidden = (id !== 'detailMode');
  }

  /* ===== List render ===== */
  var qInput, stageFilter, regionFilter, typeFilter, rowsEl, emptyEl, sublineEl, syncMetaEl;

  function populateTypeDropdowns() {
    var types = loadTypes();
    if (typeFilter) {
      var cur = typeFilter.value;
      typeFilter.innerHTML = '<option value="">All types</option>' +
        types.map(function (t) { return '<option value="' + esc(t.id) + '">' + esc(t.label) + '</option>'; }).join('');
      typeFilter.value = cur;
    }
    var formType = document.getElementById('f-type');
    if (formType) {
      var cur2 = formType.value;
      formType.innerHTML = types.map(function (t) { return '<option value="' + esc(t.id) + '">' + esc(t.label) + '</option>'; }).join('');
      if (cur2) formType.value = cur2;
    }
  }

  function renderList() {
    var all = allContacts();
    var q = (qInput.value || '').trim().toLowerCase();
    var stage = stageFilter.value;
    var region = regionFilter.value;
    var type = typeFilter.value;

    var matched = all.filter(function (c) {
      if (stage && c.stage !== stage) return false;
      if (type && (c.customerType || '') !== type) return false;
      if (region && regionOf(c.state) !== region) return false;
      if (!q) return true;
      var hay = [c.firstName, c.lastName, c.email, c.phone, c.company, c.city, c.state, (c.tags||[]).join(' '), typeLabel(c.customerType)].filter(Boolean).join(' ').toLowerCase();
      return hay.indexOf(q) >= 0;
    });

    sublineEl.textContent = matched.length + ' of ' + all.length + ' contact' + (all.length === 1 ? '' : 's') + (q || stage || region || type ? ' shown' : '');

    rowsEl.innerHTML = '';
    if (matched.length === 0) {
      emptyEl.hidden = false;
      var firstChild = emptyEl.querySelector('.big');
      if (firstChild) firstChild.textContent = all.length === 0 ? 'No contacts yet.' : 'No matches.';
      return;
    }
    emptyEl.hidden = true;

    var html = '';
    matched.forEach(function (c) {
      var name = ((c.firstName || '') + ' ' + (c.lastName || '')).trim() || '(no name)';
      var loc = [c.city, c.state].filter(Boolean).join(', ');
      var tags = (c.tags || []).map(function (t) { return esc(t); }).join(', ');
      var typeChip = c.customerType
        ? '<span class="ctype" style="background:' + typeColor(c.customerType) + '22;color:' + typeColor(c.customerType) + ';">' + esc(typeLabel(c.customerType)) + '</span>'
        : '<span class="muted">—</span>';
      html +=
        '<tr data-id="' + esc(c.id) + '">' +
          '<td data-label="Name">' +
            '<div class="name">' + esc(name) + (c.title ? ' <span class="muted">· ' + esc(c.title) + '</span>' : '') + '</div>' +
            (c.email ? '<div class="email">' + esc(c.email) + '</div>' : '') +
            (c.phone ? '<div class="muted">' + esc(c.phone) + '</div>' : '') +
          '</td>' +
          '<td data-label="Company">' + esc(c.company || '—') + '</td>' +
          '<td data-label="Type">' + typeChip + '</td>' +
          '<td data-label="Stage"><span class="stage ' + esc(c.stage || 'lead') + '">' + esc(c.stage || 'lead') + '</span></td>' +
          '<td data-label="Location">' + (loc ? esc(loc) : '<span class="muted">—</span>') + '</td>' +
          '<td data-label="Tags">' + (tags ? esc(tags) : '<span class="muted">—</span>') + '</td>' +
          '<td class="actions">' +
            '<button class="icon-btn danger" data-act="delete" title="Delete">&#10005;</button>' +
          '</td>' +
        '</tr>';
    });
    rowsEl.innerHTML = html;

    var regions = {};
    all.forEach(function (c) { var r = regionOf(c.state); if (r) regions[r] = true; });
    var current = regionFilter.value;
    regionFilter.innerHTML = '<option value="">All regions</option>' +
      Object.keys(regions).sort().map(function (r) { return '<option value="' + esc(r) + '">' + esc(r) + '</option>'; }).join('');
    regionFilter.value = current;
  }

            (cv.details ? '<div class="details">' + esc(cv.details) + '</div>' : '') +

    var wnotesHtml = wnotes.length === 0

      : '<ul class="timeline">' + wnotes.map(function (w) {
          return '<li>' +

    el.innerHTML =
      '<div class="detail-head">' +
        '<div class="who">' +
          '<a class="back" href="crm.html">&larr; All contacts</a>' +
          '<h2 style="margin-top:6px;">' + esc(name) + '</h2>' +
          (meta ? '<div class="meta-line">' + meta + '</div>' : '') +
          (contactLine ? '<div class="meta-line">' + contactLine + '</div>' : '') +
          (locLine ? '<div class="meta-line">' + esc(locLine) + '</div>' : '') +
          '<div class="chips">' + chips + '</div>' +
        '</div>' +
        '<div class="top-actions">' +
          '<button class="btn btn-ghost" id="printBtn" type="button">Print</button>' +

        '</div>' +
      '</div>' +

      '<div class="detail-grid">' +
        '<div>' +
          // ---- Profile (editable) ----

            '<h4>Profile <button class="add" id="saveProfileBtn">Save changes</button></h4>' +
            '<div class="field-row"><div class="k">First name</div><div class="v editable" contenteditable="true" data-prop="firstName">' + esc(c.firstName || '') + '</div></div>' +
            '<div class="field-row"><div class="k">Last name</div><div class="v editable" contenteditable="true" data-prop="lastName">' + esc(c.lastName || '') + '</div></div>' +
            '<div class="field-row"><div class="k">Email</div><div class="v editable" contenteditable="true" data-prop="email">' + esc(c.email || '') + '</div></div>' +

            '<div class="field-row"><div class="k">State</div><div class="v editable" contenteditable="true" data-prop="state">' + esc(c.state || '') + '</div></div>' +
            '<div class="field-row"><div class="k">ZIP</div><div class="v editable" contenteditable="true" data-prop="zip">' + esc(c.zip || '') + '</div></div>' +

            '<div class="field-row"><div class="k">Tags</div><div class="v editable" contenteditable="true" data-prop="tagsLine">' + esc((c.tags || []).join(', ')) + '</div></div>' +
            '<div class="field-row"><div class="k">Notes</div><div class="v editable" contenteditable="true" data-prop="notes" style="white-space:pre-wrap;">' + esc(c.notes || '') + '</div></div>' +

          // ---- Weekly coaching notes ----

              '<div class="row">' +
                '<label style="flex:0 0 auto;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;">Week of <input id="weeklyDate" type="date" value="' + esc(thisMonday()) + '" style="font:inherit;font-size:13px;padding:5px 7px;border:1px solid var(--line,#e6e5e1);border-radius:6px;" /></label>' +

      if (window.bccAudit) window.bccAudit('contact-delete', { key: c.id, path: '/crm.html' });
      location.href = 'crm.html';
    };

    document.getElementById('saveProfileBtn').onclick = function () {
      var props = ['firstName','lastName','email','phone','title','company','website','street','city','state','zip','industry','yearsInBusiness','companySize','notes'];
      var updated = Object.assign({}, c);
      props.forEach(function (p) {
        var el = document.querySelector('[data-prop="' + p + '"]');
        if (el) updated[p] = el.innerText.trim();

      renderDetail(updated.id);
    };

    document.getElementById('d-stage').onchange = function () {
      var u = getContact(c.id); u.stage = this.value; saveContact(u);
    };
    document.getElementById('d-type').onchange = function () {
      var u = getContact(c.id); u.customerType = this.value; saveContact(u);
    };
    var dCompanyEl = document.getElementById('d-companyId');
    if (dCompanyEl) dCompanyEl.onchange = function () {
      var u = getContact(c.id); u.companyId = this.value || null;
      // Convenience: if a company is linked and the free-text company field
      // is empty, mirror the company name into it so list views still read.
      if (u.companyId && !u.company) {
        var co = null;
        try { co = JSON.parse(localStorage.getItem(u.companyId) || 'null'); } catch (e) {}
        if (co && co.name) u.company = co.name;
      }
      saveContact(u);
      renderDetail(u.id);
    };

    document.getElementById('needAdd').onclick = function () {
      var inp = document.getElementById('needInput');
      var label = inp.value.trim(); if (!label) return;
      var u = getContact(c.id);
      u.needs = u.needs || [];
      u.needs.push({ id: 'n' + uid(), label: label, status: 'open', addedAt: nowIso() });
      saveContact(u);
      if (window.bccAudit) window.bccAudit('need-add', { key: u.id, path: '/crm.html', meta: { label: label } });
      inp.value = '';
      renderDetail(u.id);
    };
    document.getElementById('needInput').onkeydown = function (e) { if (e.key === 'Enter') document.getElementById('needAdd').click(); };

    document.querySelectorAll('[data-need]').forEach(function (cb) {
      cb.onchange = function () {
        var u = getContact(c.id);
        var nid = cb.getAttribute('data-need');
        u.needs = (u.needs || []).map(function (n) { return n.id === nid ? Object.assign({}, n, { status: cb.checked ? 'met' : 'open' }) : n; });
        saveContact(u);
      };
    });
    document.querySelectorAll('[data-need-del]').forEach(function (btn) {
      btn.onclick = function () {
        if (!confirm('Remove this need?')) return;
        var u = getContact(c.id);
        var nid = btn.getAttribute('data-need-del');
        u.needs = (u.needs || []).filter(function (n) { return n.id !== nid; });
        saveContact(u);
        renderDetail(u.id);
      };
    });

    document.getElementById('convoAdd').onclick = function () {
      var summary = document.getElementById('convoSummary').value.trim();
      if (!summary) { (window.bccNotify || alert)('Add a one-line summary first.', 'warn'); return; }
      var cv = {
        contactId: c.id,
        type: document.getElementById('convoType').value,
        summary: summary,
        details: document.getElementById('convoDetails').value.trim(),
        at: nowIso(),
        createdBy: (window.bccUser && window.bccUser.userDetails) || ''
      };
      saveConvo(cv);
      if (window.bccAudit) window.bccAudit('convo-add', { key: cv.id, path: '/crm.html', meta: { type: cv.type, summary: summary } });
      document.getElementById('convoSummary').value = '';
      document.getElementById('convoDetails').value = '';
      renderDetail(c.id);
    };
    document.querySelectorAll('[data-convo-del]').forEach(function (btn) {
      btn.onclick = function (e) {
        e.stopPropagation();
        if (!confirm('Delete this conversation entry?')) return;
        deleteConvo(btn.getAttribute('data-convo-del'));
        renderDetail(c.id);
      };
    });
    document.getElementById('weeklyAdd').onclick = function () {
      var note = document.getElementById('weeklyNote').value.trim();
      if (!note) { (window.bccNotify || alert)('Write the note first.', 'warn'); return; }
      var w = {
        contactId: c.id,
        weekOf: document.getElementById('weeklyDate').value || thisMonday(),
        note: note,
        createdBy: (window.bccUser && window.bccUser.userDetails) || ''
      };
      saveWeeklyNote(w);
      if (window.bccAudit) window.bccAudit('weekly-note-add', { key: w.id, path: '/crm.html', meta: { weekOf: w.weekOf } });
      if (window.bccNotifySaved) window.bccNotifySaved('Weekly note saved.');
      document.getElementById('weeklyNote').value = '';
      renderDetail(c.id);
    };
    document.querySelectorAll('[data-weekly-del]').forEach(function (btn) {
      btn.onclick = function (e) {
        e.stopPropagation();
        if (!confirm('Delete this weekly note?')) return;
        deleteWeeklyNote(btn.getAttribute('data-weekly-del'));
        renderDetail(c.id);
      };
    });
  }

  /* ===== Events (list mode) ===== */
  function wireList() {
    qInput = document.getElementById('q');
    stageFilter = document.getElementById('stageFilter');
    regionFilter = document.getElementById('regionFilter');
    typeFilter = document.getElementById('typeFilter');
    rowsEl = document.getElementById('rows');
    emptyEl = document.getElementById('empty');
    sublineEl = document.getElementById('subline');
    syncMetaEl = document.getElementById('syncMeta');

    qInput.addEventListener('input', renderList);
    stageFilter.addEventListener('change', renderList);
    regionFilter.addEventListener('change', renderList);
    typeFilter.addEventListener('change', renderList);

    var panel = document.getElementById('panel');
    var FORM_IDS = ['f-first','f-last','f-email','f-phone','f-title','f-company','f-website','f-street','f-city','f-state','f-zip','f-industry','f-years','f-size','f-tags','f-notes'];
    document.getElementById('newBtn').addEventListener('click', function () {
      resetForm();
      document.getElementById('panelTitle').textContent = 'New contact';
      panel.classList.add('open');
      document.getElementById('f-first').focus();
    });
    document.getElementById('cancelBtn').addEventListener('click', function () {
      panel.classList.remove('open'); resetForm();
    });
    function resetForm() {
      FORM_IDS.forEach(function (id) { document.getElementById(id).value = ''; });
      document.getElementById('f-stage').value = 'lead';
      var types = loadTypes(); if (types[0]) document.getElementById('f-type').value = types[0].id;
      var ss = document.getElementById('scanStatus'); if (ss) { ss.style.display = 'none'; ss.textContent = ''; }
      var es = document.getElementById('enrichStatus'); if (es) es.textContent = '';
    }
    document.getElementById('saveBtn').addEventListener('click', function () {
      var first = document.getElementById('f-first').value.trim();
      if (!first) {
        (window.bccNotify || alert)('First name is required.', 'warn');
        document.getElementById('f-first').focus();
        return;
      }
      var c = {
        firstName: first,
        lastName:  document.getElementById('f-last').value.trim(),
        email:     document.getElementById('f-email').value.trim(),
        phone:     document.getElementById('f-phone').value.trim(),
        title:     document.getElementById('f-title').value.trim(),
        company:   document.getElementById('f-company').value.trim(),
        website:   document.getElementById('f-website').value.trim(),
        street:    document.getElementById('f-street').value.trim(),
        city:      document.getElementById('f-city').value.trim(),
        state:     document.getElementById('f-state').value.trim(),
        zip:       document.getElementById('f-zip').value.trim(),
        industry:  document.getElementById('f-industry').value.trim(),
        yearsInBusiness: document.getElementById('f-years').value.trim(),
        companySize: document.getElementById('f-size').value.trim(),
        customerType: document.getElementById('f-type').value || '',
        stage:     document.getElementById('f-stage').value || 'lead',
        tags:      document.getElementById('f-tags').value.split(',').map(function (s) { return s.trim(); }).filter(Boolean),
        notes:     document.getElementById('f-notes').value.trim(),
        needs:     [],
        ownerId:   (window.bccUser && window.bccUser.userDetails) || ''
      };
      saveContact(c);
      if (window.bccAudit) window.bccAudit('contact-create', { key: c.id, path: '/crm.html' });
      if (window.bccNotifySaved) window.bccNotifySaved('Contact saved.');
      else (window.bccNotify || alert)('Saved.', 'success');
      panel.classList.remove('open');
      resetForm();
      renderList();
    });

    // ---- Business-card scanner (Claude vision) ----
    function setScan(msg, kind) {
      var ss = document.getElementById('scanStatus'); if (!ss) return;
      ss.style.display = msg ? 'block' : 'none'; ss.textContent = msg || '';
      ss.style.color = kind === 'err' ? 'var(--burgundy)' : (kind === 'ok' ? 'var(--green)' : 'var(--ink)');
    }
    function fillForce(id, val) { if (val == null || val === '') return; var el = document.getElementById(id); if (el) el.value = String(val).trim(); }
    function fillIfEmpty(id, val) { if (val == null || val === '') return; var el = document.getElementById(id); if (el && !el.value.trim()) el.value = String(val).trim(); }
    function appendNote(text) { if (!text) return; var n = document.getElementById('f-notes'); if (n.value.indexOf(String(text).slice(0, 24)) >= 0) return; n.value = (n.value ? n.value + '\n' : '') + text; }
    function cleanWeb(w) { return String(w || '').replace(/^https?:\/\//i, '').replace(/\/$/, ''); }
    // Fill the single New-contact panel from one parsed card.
    function fillPanelFrom(d) {
      fillForce('f-first', d.firstName); fillForce('f-last', d.lastName);
      fillForce('f-email', d.email); fillForce('f-phone', d.phone || d.mobilePhone);
      fillForce('f-title', d.title); fillForce('f-company', d.company);
      fillForce('f-website', cleanWeb(d.website));
      fillForce('f-street', d.street); fillForce('f-city', d.city); fillForce('f-state', d.state); fillForce('f-zip', d.zip);
      appendNote(d.otherInfo);
    }
    document.getElementById('scanBtn').addEventListener('click', function () { document.getElementById('cardFile').click(); });
    document.getElementById('cardFile').addEventListener('change', function () {
      var files = this.files ? Array.prototype.slice.call(this.files) : []; this.value = '';
      if (!files.length) return;
      if (files.length > 10) { (window.bccNotify || alert)('Up to 10 images at a time.', 'warn'); return; }
      var total = 0;
      for (var i = 0; i < files.length; i++) { if (files[i].size > 12 * 1024 * 1024) { (window.bccNotify || alert)('Each image must be under 12 MB.', 'warn'); return; } total += files[i].size; }
      if (total > 30 * 1024 * 1024) { (window.bccNotify || alert)('Those images total over 30 MB — pick fewer.', 'warn'); return; }
      resetForm();
      document.getElementById('panelTitle').textContent = 'New contact — from card';
      panel.classList.add('open');
      setScan('📇 Reading ' + (files.length > 1 ? files.length + ' images' : 'the card') + '…', '');
      var fd = new FormData(); files.forEach(function (f) { fd.append('file', f); });
      fetch('/api/ai/scan-card', { method: 'POST', credentials: 'include', body: fd })
        .then(function (r) { return r.json().catch(function () { return { ok: false, error: 'bad response' }; }); })
        .then(function (j) {
          if (j && j.needsKey) { setScan('AI scanning isn’t configured yet — an admin needs to add ANTHROPIC_API_KEY in the app settings.', 'err'); return; }
          if (!j || !j.ok) { setScan('Could not read the card(s): ' + ((j && j.error) || 'error'), 'err'); return; }
          var contacts = j.contacts || [];
          if (contacts.length <= 1) {
            var d = contacts[0] || {};
            fillPanelFrom(d);
            setScan('✓ Card read — review the fields below' + ((d.website || d.email) ? '; searching the website too…' : '.'), 'ok');
            document.getElementById('f-first').focus();
            if (d.website || (d.email && d.email.indexOf('@') > 0)) enrichCompany(true);
          } else {
            panel.classList.remove('open'); resetForm();
            openBatchReview(contacts);
          }
        })
        .catch(function () { setScan('Scan failed — please try again.', 'err'); });
    });

    // ---- Website enrichment (Claude reads the company site) ----
    function enrichCompany(auto) {
      var website = document.getElementById('f-website').value.trim();
      var email = document.getElementById('f-email').value.trim();
      var company = document.getElementById('f-company').value.trim();
      var es = document.getElementById('enrichStatus');
      var hasEmail = email.indexOf('@') > 0;
      if (!website && !hasEmail) { if (!auto) { es.style.color = 'var(--burgundy)'; es.textContent = 'Add a website or work email first.'; } return; }
      es.style.color = 'var(--muted)'; es.textContent = '🔎 Searching the website…';
      var btn = document.getElementById('enrichBtn'); btn.disabled = true;
      fetch('/api/ai/enrich-company', { method: 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ website: website, email: email, company: company }) })
        .then(function (r) { return r.json().catch(function () { return { ok: false }; }); })
        .then(function (j) {
          btn.disabled = false;
          if (j && j.needsKey) { es.style.color = 'var(--burgundy)'; es.textContent = 'AI isn’t configured — add ANTHROPIC_API_KEY in the app settings.'; return; }
          if (!j || !j.ok) { es.style.color = auto ? 'var(--muted)' : 'var(--burgundy)'; es.textContent = (j && j.error) || 'Could not search the website.'; return; }
          var d = j.data || {};
          if (j.website) fillForce('f-website', j.website.replace(/^https?:\/\//i, '').replace(/\/$/, ''));
          fillIfEmpty('f-industry', d.businessType);
          if (d.yearsInBusiness) fillIfEmpty('f-years', d.yearsInBusiness); else if (d.foundedYear) fillIfEmpty('f-years', (new Date().getFullYear() - d.foundedYear));
          fillIfEmpty('f-size', d.companySize);
          fillIfEmpty('f-street', d.street); fillIfEmpty('f-city', d.city); fillIfEmpty('f-state', d.state); fillIfEmpty('f-zip', d.zip);
          fillIfEmpty('f-phone', d.phone);
          var bits = [];
          if (d.description) bits.push(d.description);
          if (d.foundedYear) bits.push('Founded ' + d.foundedYear + '.');
          if (d.services && d.services.length) bits.push('Services: ' + d.services.slice(0, 8).join(', ') + '.');
          if (d.socialLinks && d.socialLinks.length) bits.push(d.socialLinks.slice(0, 5).join('  '));
          if (bits.length) appendNote(bits.join('\n'));
          es.style.color = 'var(--green)'; es.textContent = '✓ Enriched from ' + (j.website || website);
        })
        .catch(function () { btn.disabled = false; es.style.color = 'var(--burgundy)'; es.textContent = 'Enrichment failed.'; });
    }
    document.getElementById('enrichBtn').addEventListener('click', function () { enrichCompany(false); });

    // ---- Batch review when a scan yields multiple cards ----
    function openBatchReview(contacts) {
      var types = loadTypes(); var defType = types[0] ? types[0].id : '';
      var batch = contacts.map(function (d) {
        return { firstName: d.firstName || '', lastName: d.lastName || '', title: d.title || '', company: d.company || '',
          email: d.email || '', phone: d.phone || d.mobilePhone || '', website: cleanWeb(d.website),
          street: d.street || '', city: d.city || '', state: d.state || '', zip: d.zip || '',
          industry: '', yearsInBusiness: '', companySize: '', notes: d.otherInfo || '', sel: true, enriched: false };
      });
      var ov = document.createElement('div'); ov.id = 'batch_modal';
      ov.style.cssText = 'position:fixed;inset:0;background:rgba(20,18,15,.5);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow:auto;';
      function field(i, f, ph) { return '<input data-i="' + i + '" data-f="' + f + '" placeholder="' + ph + '" value="' + esc(batch[i][f]) + '" style="font:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--line,#e6e5e1);border-radius:6px;width:100%;box-sizing:border-box;" />'; }
      function cardHtml(i) {
        return '<div data-card="' + i + '" style="border:1px solid var(--line,#e6e5e1);border-radius:10px;padding:12px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;">' +
          '<label style="display:flex;align-items:center;padding-top:6px;" title="Include this card"><input type="checkbox" data-sel="' + i + '" checked /></label>' +
          '<div style="flex:1;min-width:0;display:grid;grid-template-columns:1fr 1fr;gap:8px;">' +
            field(i, 'firstName', 'First name') + field(i, 'lastName', 'Last name') +
            field(i, 'title', 'Title') + field(i, 'company', 'Company') +
            field(i, 'email', 'Email') + field(i, 'phone', 'Phone') +
            '<div style="grid-column:1/3;">' + field(i, 'website', 'Website') + '</div>' +
            '<div data-extra="' + i + '" style="grid-column:1/3;font-size:12px;color:var(--gold-deep,#8a6d2f);"></div>' +
          '</div></div>';
      }
      ov.innerHTML = '<div style="background:#fff;border-radius:14px;max-width:900px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.3);">' +
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line,#e6e5e1);">' +
          '<div><div style="font-weight:700;font-size:16px;">' + batch.length + ' contacts found</div><div style="font-size:12.5px;color:var(--muted,#6b7077);">Review &amp; edit below. Untick any card you don’t want, then save.</div></div>' +
          '<button id="batch_close" type="button" class="btn btn-ghost" style="font-size:18px;min-height:34px;width:38px;">×</button>' +
        '</div>' +
        '<div id="batch_list" style="padding:14px 20px;max-height:62vh;overflow:auto;">' + batch.map(function (_, i) { return cardHtml(i); }).join('') + '</div>' +
        '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:14px 20px;border-top:1px solid var(--line,#e6e5e1);">' +
          '<span id="batch_status" style="margin-right:auto;font-size:12.5px;color:var(--muted,#6b7077);"></span>' +
          '<button id="batch_enrich" type="button" class="btn btn-ghost">🔎 Enrich all from websites</button>' +
          '<button id="batch_cancel" type="button" class="btn btn-ghost">Cancel</button>' +
          '<button id="batch_save" type="button" class="btn btn-primary">Save ' + batch.length + ' contacts</button>' +
        '</div></div>';
      document.body.appendChild(ov);
      var status = document.getElementById('batch_status');
      function close() { var m = document.getElementById('batch_modal'); if (m) m.remove(); document.removeEventListener('keydown', onKey); }
      function onKey(e) { if (e.key === 'Escape') close(); }
      document.addEventListener('keydown', onKey);
      ov.addEventListener('click', function (e) { if (e.target === ov) close(); });
      document.getElementById('batch_close').onclick = close;
      document.getElementById('batch_cancel').onclick = close;
      function selCount() { return batch.filter(function (b) { return b.sel; }).length; }
      function updateCount() { var s = document.getElementById('batch_save'); if (s) s.textContent = 'Save ' + selCount() + ' contact' + (selCount() === 1 ? '' : 's'); }
      ov.querySelectorAll('input[data-f]').forEach(function (el) { el.addEventListener('input', function () { batch[+el.getAttribute('data-i')][el.getAttribute('data-f')] = el.value; }); });
      ov.querySelectorAll('input[data-sel]').forEach(function (cb) {
        cb.addEventListener('change', function () { var i = +cb.getAttribute('data-sel'); batch[i].sel = cb.checked; var card = ov.querySelector('[data-card="' + i + '"]'); if (card) card.style.opacity = cb.checked ? '1' : '.45'; updateCount(); });
      });
      document.getElementById('batch_enrich').onclick = function () {
        var idxs = batch.map(function (b, i) { return i; }).filter(function (i) { return batch[i].sel && !batch[i].enriched && (batch[i].website || (batch[i].email && batch[i].email.indexOf('@') > 0)); });
        if (!idxs.length) { status.textContent = 'Nothing to enrich (each card needs a website or work email).'; return; }
        var btn = document.getElementById('batch_enrich'); btn.disabled = true; var total = idxs.length, done = 0;
        (function next() {
          if (!idxs.length) { btn.disabled = false; status.textContent = '✓ Enriched ' + done + ' of ' + total + ' cards.'; return; }
          var i = idxs.shift(); status.textContent = '🔎 Enriching ' + (done + 1) + '/' + total + '…';
          fetch('/api/ai/enrich-company', { method: 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ website: batch[i].website, email: batch[i].email, company: batch[i].company }) })
            .then(function (r) { return r.json().catch(function () { return { ok: false }; }); })
            .then(function (j) {
              if (j && j.ok) {
                var d = j.data || {}; batch[i].enriched = true;
                if (j.website) { batch[i].website = cleanWeb(j.website); var wf = ov.querySelector('input[data-i="' + i + '"][data-f="website"]'); if (wf) wf.value = batch[i].website; }
                if (!batch[i].industry) batch[i].industry = d.businessType || '';
                if (!batch[i].yearsInBusiness) batch[i].yearsInBusiness = d.yearsInBusiness || (d.foundedYear ? (new Date().getFullYear() - d.foundedYear) : '');
                if (!batch[i].companySize) batch[i].companySize = d.companySize || '';
                if (!batch[i].street) batch[i].street = d.street || '';
                if (!batch[i].city) batch[i].city = d.city || '';
                if (!batch[i].state) batch[i].state = d.state || '';
                if (!batch[i].zip) batch[i].zip = d.zip || '';
                var note = [];
                if (d.description) note.push(d.description);
                if (d.services && d.services.length) note.push('Services: ' + d.services.slice(0, 6).join(', '));
                if (note.length) batch[i].notes = (batch[i].notes ? batch[i].notes + '\n' : '') + note.join('\n');
                var ex = ov.querySelector('[data-extra="' + i + '"]'); if (ex) ex.textContent = [batch[i].industry, batch[i].yearsInBusiness ? batch[i].yearsInBusiness + ' yrs in business' : '', batch[i].companySize].filter(Boolean).join(' · ');
              }
              done++; next();
            })
            .catch(function () { done++; next(); });
        })();
      };
      document.getElementById('batch_save').onclick = function () {
        var sel = batch.filter(function (b) { return b.sel && (b.firstName || b.company || b.email); });
        if (!sel.length) { status.textContent = 'Nothing to save — each card needs at least a name, company, or email.'; return; }
        sel.forEach(function (b) {
          var c = { firstName: (b.firstName || '').trim(), lastName: (b.lastName || '').trim(), email: (b.email || '').trim(), phone: (b.phone || '').trim(),
            title: (b.title || '').trim(), company: (b.company || '').trim(), website: cleanWeb(b.website), street: (b.street || '').trim(),
            city: (b.city || '').trim(), state: (b.state || '').trim(), zip: (b.zip || '').trim(), industry: (b.industry || '').trim(),
            yearsInBusiness: String(b.yearsInBusiness || '').trim(), companySize: (b.companySize || '').trim(),
            customerType: defType, stage: 'lead', tags: [], notes: (b.notes || '').trim(), needs: [], ownerId: (window.bccUser && window.bccUser.userDetails) || '' };
          saveContact(c);
          if (window.bccAudit) window.bccAudit('contact-create', { key: c.id, path: '/crm.html', meta: { batch: true } });
        });
        if (window.bccNotifySaved) window.bccNotifySaved('Saved ' + sel.length + ' contacts.'); else (window.bccNotify || alert)('Saved ' + sel.length + ' contacts.', 'success');
        close(); renderList();
      };
    }

    rowsEl.addEventListener('click', function (e) {
      var btn = e.target.closest('button[data-act]');
      var tr = e.target.closest('tr[data-id]');
      if (!tr) return;
      var id = tr.dataset.id;
      if (btn && btn.dataset.act === 'delete') {
        e.stopPropagation();
        if (!confirm('Delete this contact? This removes them from the cloud sync too.')) return;
        deleteContact(id);
        if (window.bccAudit) window.bccAudit('contact-delete', { key: id, path: '/crm.html' });
        renderList();
        return;
      }
      // Row click → go to detail view
      location.href = 'crm.html?id=' + encodeURIComponent(id);
    });

    document.getElementById('csvBtn').addEventListener('click', function () {
      document.getElementById('csvFile').click();
    });
    document.getElementById('csvFile').addEventListener('change', function (e) {
      var f = e.target.files && e.target.files[0]; if (!f) return;
      var reader = new FileReader();
      reader.onload = function () { importCsv(String(reader.result || '')); };
      reader.onerror = function () { (window.bccNotify || alert)('Could not read file.', 'error'); };
      reader.readAsText(f);
      e.target.value = '';
    });
  }

  /* ===== CSV import =====
   * RFC-4180-ish parser: handles quoted fields, embedded commas, escaped
   * quotes via "". Header row maps to known contact fields via alias
   * lookup; unknown columns are dropped silently. Dedupes by email
   * (case-insensitive); same email = update existing instead of create.
   * Existing tags merge with imported tags. Audit row per import.
   */
  function parseCsv(text) {
    var rows = [];
    var i = 0, cur = '', row = [], inQuote = false;
    while (i < text.length) {
      var ch = text[i];
      if (inQuote) {
        if (ch === '"') {
          if (text[i+1] === '"') { cur += '"'; i += 2; continue; }
          inQuote = false; i++; continue;
        }
        cur += ch; i++; continue;
      }
      if (ch === '"') { inQuote = true; i++; continue; }
      if (ch === ',') { row.push(cur); cur = ''; i++; continue; }
      if (ch === '\r') { i++; continue; }
      if (ch === '\n') { row.push(cur); rows.push(row); row = []; cur = ''; i++; continue; }
      cur += ch; i++;
    }
    if (cur.length || row.length) { row.push(cur); rows.push(row); }
    return rows.filter(function (r) { return r.length && r.some(function (c) { return c.trim(); }); });
  }
  var HEADER_ALIASES = {
    firstname: 'firstName', 'first name': 'firstName', first: 'firstName', fname: 'firstName',
    lastname: 'lastName', 'last name': 'lastName', last: 'lastName', lname: 'lastName', surname: 'lastName',
    email: 'email', mail: 'email', 'e-mail': 'email',
    phone: 'phone', mobile: 'phone', tel: 'phone',
    title: 'title', position: 'title', role: 'title',
    company: 'company', org: 'company', organization: 'company', business: 'company',
    city: 'city', town: 'city',
    state: 'state', province: 'state', region: 'state',
    type: 'customerType', 'customer type': 'customerType', service: 'customerType', 'service line': 'customerType',
    stage: 'stage', status: 'stage',
    tags: 'tags', tag: 'tags', labels: 'tags',
    notes: 'notes', note: 'notes', comments: 'notes'
  };
  function importCsv(text) {
    var rows = parseCsv(text);
    if (rows.length < 2) { (window.bccNotify || alert)('CSV has no data rows.', 'warn'); return; }
    var header = rows[0].map(function (h) { return h.trim().toLowerCase(); });
    var keyMap = header.map(function (h) { return HEADER_ALIASES[h] || null; });
    var unknownCols = header.filter(function (_, idx) { return !keyMap[idx]; });

    // Existing contacts indexed by email (lowercase) for dedupe
    var existing = allContacts();
    var byEmail = {};
    existing.forEach(function (c) { if (c.email) byEmail[c.email.toLowerCase()] = c; });

    var types = loadTypes(); var typeIds = types.map(function (t) { return t.id; });
    var stages = ['lead','qualified','customer','inactive'];

    var created = 0, updated = 0, skipped = 0;
    for (var r = 1; r < rows.length; r++) {
      var raw = rows[r];
      var rec = { tags: [] };
      for (var c = 0; c < raw.length; c++) {
        var k = keyMap[c]; if (!k) continue;
        var v = String(raw[c] || '').trim();
        if (!v) continue;
        if (k === 'tags') {
          v.split(/[;,]/).map(function (t) { return t.trim(); }).filter(Boolean).forEach(function (t) { rec.tags.push(t); });
        } else {
          rec[k] = v;
        }
      }
      if (!rec.firstName && !rec.email) { skipped++; continue; }
      // Normalize customerType / stage to ids the rest of the app expects
      if (rec.customerType) {
        var ct = rec.customerType.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
        if (typeIds.indexOf(ct) >= 0) rec.customerType = ct;
        else {
          // try label-match against known labels
          var match = types.find(function (t) { return t.label.toLowerCase() === rec.customerType.toLowerCase(); });
          rec.customerType = match ? match.id : 'other';
        }
      } else {
        rec.customerType = 'other';
      }
      if (rec.stage) {
        var st = rec.stage.toLowerCase();
        if (stages.indexOf(st) >= 0) rec.stage = st;
        else if (st === 'prospect') rec.stage = 'lead';
        else if (st === 'won' || st === 'active') rec.stage = 'customer';
        else if (st === 'lost' || st === 'churned') rec.stage = 'inactive';
        else rec.stage = 'lead';
      } else {
        rec.stage = 'lead';
      }
      if (!rec.ownerId) rec.ownerId = (window.bccUser && window.bccUser.userDetails) || '';

      var emailLc = rec.email && rec.email.toLowerCase();
      if (emailLc && byEmail[emailLc]) {
        // Update — merge tags, keep existing id/createdAt/needs/convos
        var existingRec = byEmail[emailLc];
        rec.id = existingRec.id;
        rec.createdAt = existingRec.createdAt;
        rec.needs = existingRec.needs || [];
        var existingTags = (existingRec.tags || []);
        rec.tags = Array.from(new Set(existingTags.concat(rec.tags)));
        saveContact(rec);
        updated++;
      } else {
        saveContact(rec);
        created++;
      }
    }

    var msg = created + ' added, ' + updated + ' updated' + (skipped ? ', ' + skipped + ' skipped' : '');
    if (unknownCols.length) msg += '. Ignored columns: ' + unknownCols.join(', ');
    if (window.bccAudit) window.bccAudit('contact-create', { path: '/crm.html', meta: { action: 'csv-import', created: created, updated: updated, skipped: skipped } });
    if (window.bccNotify) window.bccNotify(msg, 'success');
    else alert(msg);
    renderList();
  }

  /* ===== Bootstrap ===== */
  function init() {
    var id = getParam('id');
    populateTypeDropdowns();
    if (id) {
      show('detailMode');
      renderDetail(id);
    } else {
      show('listMode');
      wireList();
      renderList();
    }
    if (syncMetaEl) syncMetaEl.textContent = 'Synced via bcc-api.js';
  }

  window.addEventListener('bcc-data-ready', function () {
    populateTypeDropdowns();
    var id = getParam('id');
    if (id) renderDetail(id); else if (rowsEl) renderList();
  });
  window.addEventListener('bcc-auth-ready', function () { document.body.dataset.didInit = '1'; init(); });
  setTimeout(function () { if (!document.body.dataset.didInit) { document.body.dataset.didInit = '1'; init(); } }, 600);
})();
</script>

</body>
</html>
