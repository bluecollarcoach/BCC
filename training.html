<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#1a1a1a" />
<meta name="robots" content="noindex, nofollow" />
<title>Training · BCC Connect</title>
<link rel="icon" type="image/png" href="bcc-logo.png" />
<link rel="manifest" href="manifest.json" />
<style>
  :root {
    --ink:#1a1a1a; --ink-line:#2e2c27;
    --gold:#c5a55a; --gold-warm:#d4b67a; --gold-deep:#a8884a; --gold-fade:rgba(197,165,90,0.12);
    --chrome:#f6f6f4; --chrome-mute:#e6e5e1; --muted:#6b7077;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Inter', system-ui, sans-serif; color:var(--ink); background:var(--chrome); }
  header.topbar {
    display:flex; align-items:center; gap:14px; padding:12px 22px; color:var(--chrome);
    background:linear-gradient(90deg, #141414, #1f1f1f);
    border-bottom:1px solid var(--ink-line); position:sticky; top:0; z-index:50;
  }
  header.topbar a.home { display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--chrome); }
  header.topbar img { height:30px; }
  header.topbar .wordmark { font-family:'Source Serif 4', Georgia, serif; font-size:14px; font-weight:700; letter-spacing:1.5px; }
  header.topbar .wordmark .light { color:var(--gold); }
  header.topbar .module {
    font-size:11px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--gold-warm);
    border-left:1px solid rgba(255,255,255,0.18); padding-left:14px; margin-left:4px;
  }
  .page { max-width:1100px; margin:0 auto; padding:22px 22px 70px; }
  .page-head { display:flex; align-items:flex-end; justify-content:space-between; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
  .page-head h1 { font-family:'Source Serif 4', Georgia, serif; font-size:26px; margin:0; }
  .page-head .sub { color:var(--muted); font-size:13px; margin-top:4px; }
  .btn { min-height:38px; border:0; border-radius:8px; padding:0 14px; font:inherit; font-weight:700; font-size:13px; cursor:pointer; }
  .btn-primary { background:var(--gold); color:#fff; }
  .btn-primary:hover { background:var(--gold-deep); }
  .btn-ghost { background:transparent; color:var(--ink); border:1px solid var(--chrome-mute); }
  .btn-ghost:hover { background:var(--chrome-mute); }
  .btn-danger { background:transparent; color:#6a1c1c; border:1px solid #e6c8c8; }
  .btn-danger:hover { background:#f3e0e0; }

  .course-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:14px; }
  .course-card {
    background:#fff; border:1px solid var(--chrome-mute); border-radius:12px;
    padding:18px; cursor:pointer; position:relative; transition:transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  }
  .course-card:hover { transform:translateY(-2px); box-shadow:0 10px 22px rgba(0,0,0,0.06); border-color:var(--gold); }
  .course-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg, var(--gold), var(--gold-warm)); border-radius:12px 12px 0 0; }
  .course-card h3 { font-family:'Source Serif 4', Georgia, serif; font-size:17px; margin:0 0 6px; }
  .course-card .blurb { color:var(--muted); font-size:12.5px; line-height:1.5; min-height:38px; }
  .course-card .stats { display:flex; gap:12px; margin-top:12px; font-size:12px; color:var(--muted); }
  .course-card .stats strong { color:var(--ink); }
  .course-card .edit-pencil {
    position:absolute; top:10px; right:10px; opacity:0;
    background:rgba(0,0,0,0.06); border:0; padding:5px 7px;
    border-radius:6px; cursor:pointer; font-size:13px;
    transition:opacity 0.12s, background 0.12s;
  }
  .course-card:hover .edit-pencil { opacity:1; }
  .course-card .edit-pencil:hover { background:rgba(0,0,0,0.12); }
  .progress-bar {
    height:6px; background:var(--chrome-mute); border-radius:3px;
    margin-top:10px; overflow:hidden;
  }
  .progress-bar .fill { height:100%; background:linear-gradient(90deg, var(--gold), var(--gold-deep)); transition:width 0.3s; }
  .progress-pct { font-size:11px; color:var(--gold-deep); font-weight:700; margin-top:4px; }

  /* Learner view */
  .learner-head {
    background:linear-gradient(160deg, #1f1f1f 0%, #1a1a1a 100%);
    color:var(--chrome); border:1px solid var(--ink-line);
    border-radius:14px; padding:24px 28px; margin-bottom:16px;
  }
  .learner-head .back {
    color:var(--gold-warm); text-decoration:none; font-size:13px;
    font-weight:600;
  }
  .learner-head .back:hover { color:#fff; }
  .learner-head h1 {
    font-family:'Source Serif 4', Georgia, serif; font-size:28px;
    color:#fff; margin:8px 0 6px;
  }
  .learner-head .blurb {
    color:rgba(255,255,255,0.72); font-size:14px; line-height:1.55;
    margin:0 0 12px; max-width:60ch;
  }
  .learner-head .pct-row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-top:14px; }
  .learner-head .progress-bar { flex:1; min-width:180px; background:rgba(255,255,255,0.10); }
  .learner-head .progress-bar .fill { background:linear-gradient(90deg, var(--gold-warm), var(--gold)); }
  .learner-head .progress-pct { color:var(--gold-warm); }
  .learner-head .completed-stamp {
    font-size:12px; font-weight:700; color:#a7e3c3;
    text-transform:uppercase; letter-spacing:1.2px;
  }

  .lesson-list { display:flex; flex-direction:column; gap:8px; }
  .lesson-row-l {
    background:#fff; border:1px solid var(--chrome-mute); border-radius:10px;
    padding:14px 16px; display:flex; align-items:center; gap:14px;
    cursor:pointer; transition:border-color 0.12s, background 0.12s;
  }
  .lesson-row-l:hover { border-color:var(--gold); }
  .lesson-row-l.done { background:#fdfcfa; }
  .lesson-row-l.done .title { text-decoration:line-through; color:var(--muted); }
  .lesson-row-l .check {
    width:24px; height:24px; border:2px solid var(--chrome-mute); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; cursor:pointer; transition:background 0.12s, border-color 0.12s;
  }
  .lesson-row-l .check::after { content:''; }
  .lesson-row-l.done .check { background:var(--gold); border-color:var(--gold); }
  .lesson-row-l.done .check::after {
    content:'✓'; color:#fff; font-weight:800; font-size:14px;
  }
  .lesson-row-l .meta { flex:1; min-width:0; }
  .lesson-row-l .meta .title { font-weight:700; font-size:14px; color:var(--ink); }
  .lesson-row-l .meta .dur { font-size:11.5px; color:var(--muted); margin-top:2px; }
  .lesson-row-l a.watch {
    color:var(--gold-deep); font-size:12.5px; font-weight:700;
    text-decoration:none; flex-shrink:0;
  }
  .lesson-row-l a.watch:hover { color:var(--gold); text-decoration:underline; }
  .empty { padding:48px 20px; text-align:center; color:var(--muted); background:#fff; border:1px solid var(--chrome-mute); border-radius:12px; }
  .empty .big { font-family:'Source Serif 4', Georgia, serif; font-size:20px; color:var(--ink); margin-bottom:6px; }

  /* Modal */
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; display:none; align-items:center; justify-content:center; padding:18px; }
  .modal-bg.open { display:flex; }
  .modal { background:#fff; border-radius:14px; padding:22px; max-width:640px; width:100%; max-height:90vh; overflow-y:auto; }
  .modal h3 { font-family:'Source Serif 4', Georgia, serif; font-size:18px; margin:0 0 14px; }
  .modal label { display:flex; flex-direction:column; gap:4px; font-size:12px; font-weight:600; color:var(--muted); }
  .modal input, .modal textarea {
    border:1px solid var(--chrome-mute); border-radius:8px; padding:9px 11px; font:inherit; font-size:14px; min-height:38px;
    color:var(--ink); background:#fff; width:100%;
  }
  .modal textarea { min-height:60px; resize:vertical; }
  .modal .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .modal .full { grid-column:1 / -1; }
  .modal .actions { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; flex-wrap:wrap; }

  /* Lessons */
  .lessons { margin-top:16px; padding-top:14px; border-top:1px solid var(--chrome-mute); }
  .lessons h4 { font-family:'Source Serif 4', Georgia, serif; font-size:14px; margin:0 0 8px; }
  .lesson-row {
    display:flex; gap:6px; padding:6px 0; align-items:center;
    border-bottom:1px dashed var(--chrome-mute);
  }
  .lesson-row:last-child { border-bottom:none; }
  .lesson-row input { flex:1; }
  .lesson-row input[type=number] { width:80px; flex:none; }
  .lesson-row .x { background:transparent; border:0; cursor:pointer; color:#6a1c1c; font-size:16px; padding:0 6px; }
  .lessons .add-btn { background:transparent; border:1px dashed var(--chrome-mute); border-radius:7px; padding:8px; width:100%; cursor:pointer; color:var(--muted); font:inherit; font-size:12px; font-weight:600; margin-top:8px; }
  .lessons .add-btn:hover { color:var(--gold-deep); border-color:var(--gold); background:var(--gold-fade); }
</style>
<script src="bcc-api.js" defer></script>
</head>
<body>
<header class="topbar">
  <a class="home" href="index.html">
    <img src="bcc-logo.png" alt="Blue Collar Coach" />
    <span class="wordmark">BLUE COLLAR <span class="light">COACH</span></span>
  </a>
  <span class="module">Training</span>
  <span style="flex:1;"></span>
</header>

<div class="page">
  <!-- CATALOG MODE -->
  <div id="catalogMode">
    <div class="page-head">
      <div>
        <h1>Training</h1>
        <div class="sub">Courses and playbooks. Click any course to start; your progress is tracked per Microsoft 365 sign-in.</div>
      </div>
      <button class="btn btn-primary" id="newBtn" type="button">+ New course</button>
    </div>
    <div id="grid"></div>
  </div>

  <!-- LEARNER MODE (rendered when URL has ?id=) -->
  <div id="learnerMode" hidden></div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">New course</h3>
    <input type="hidden" id="m-id" />
    <div class="grid">
      <label class="full">Title<input type="text" id="m-title" placeholder="First 90 Days as an Owner" /></label>
      <label class="full">Short blurb<textarea id="m-blurb" rows="2" placeholder="Who is this for? What will they get out of it?"></textarea></label>
    </div>
    <div class="lessons">
      <h4>Lessons</h4>
      <div id="lessons-rows"></div>
      <button class="add-btn" id="addLessonBtn" type="button">+ Add lesson</button>
    </div>
    <div class="actions">
      <button class="btn btn-ghost" id="m-cancel" type="button">Cancel</button>
      <button class="btn btn-danger" id="m-delete" type="button" style="display:none;">Delete course</button>
      <button class="btn btn-primary" id="m-save" type="button">Save</button>
    </div>
  </div>
</div>

<script>
(function () {
  var COURSE_PREFIX = 'bcc-course-';
  var ENROLLMENT_PREFIX = 'bcc-enrollment-';

  function meUpn() { return ((window.bccUser && window.bccUser.userDetails) || '').toLowerCase(); }
  function userSlug(upn) { return String(upn || 'anon').replace(/[^a-z0-9]+/gi,'-').replace(/^-+|-+$/g,'').toLowerCase(); }
  function enrollmentIdFor(courseId) { return ENROLLMENT_PREFIX + userSlug(meUpn()) + '-' + courseId.replace(COURSE_PREFIX, ''); }
  function loadEnrollment(courseId) {
    try { var raw = localStorage.getItem(enrollmentIdFor(courseId)); if (raw) return JSON.parse(raw); } catch (_) {}
    return null;
  }
  function saveEnrollment(courseId, mutator) {
    var id = enrollmentIdFor(courseId);
    var e = loadEnrollment(courseId) || {
      id: id,
      tenantId: 'blue-collar-coach',
      docType: 'enrollment',
      userUpn: meUpn(),
      courseId: courseId,
      progress: {},
      completedAt: null,
      createdAt: new Date().toISOString()
    };
    mutator(e);
    e.updatedAt = new Date().toISOString();
    localStorage.setItem(id, JSON.stringify(e));
    return e;
  }
  function progressFor(course) {
    var e = loadEnrollment(course.id);
    var total = (course.lessons || []).length;
    if (!e || total === 0) return { pct: 0, done: 0, total: total, completed: false };
    var done = Object.keys(e.progress || {}).filter(function (k) {
      return (course.lessons || []).some(function (l) { return l.id === k; }) && e.progress[k] === 'complete';
    }).length;
    return { pct: Math.round((done / total) * 100), done: done, total: total, completed: !!e.completedAt };
  }

  function getParam(k) { return new URLSearchParams(location.search).get(k); }
  function showMode(which) {
    document.getElementById('catalogMode').hidden = (which !== 'catalog');
    document.getElementById('learnerMode').hidden = (which !== 'learner');
  }

  function uid() { return 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2,9); }
  function nowIso() { return new Date().toISOString(); }
  function esc(s) { return String(s == null ? '' : s).replace(/[<>&"']/g, function (c) { return ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]); }); }

  function allCourses() {
    var out = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i); if (!k || k.indexOf(COURSE_PREFIX) !== 0) continue;
      try { var c = JSON.parse(localStorage.getItem(k)); if (c && c.id) out.push(c); } catch (_) {}
    }
    return out.sort(function (a, b) { return (b.updatedAt || '').localeCompare(a.updatedAt || ''); });
  }
  function getCourse(id) { try { return JSON.parse(localStorage.getItem(id) || 'null'); } catch (_) { return null; } }
  function saveCourse(c) {
    c.updatedAt = nowIso();
    if (!c.createdAt) c.createdAt = c.updatedAt;
    if (!c.id) c.id = COURSE_PREFIX + uid();
    if (!c.tenantId) c.tenantId = 'blue-collar-coach';
    c.docType = 'course';
    if (!Array.isArray(c.lessons)) c.lessons = [];
    localStorage.setItem(c.id, JSON.stringify(c));
    return c;
  }
  function deleteCourse(id) { localStorage.removeItem(id); }

  function totalMinutes(lessons) {
    return (lessons || []).reduce(function (s, l) { return s + (parseInt(l.durationMin, 10) || 0); }, 0);
  }

  function renderGrid() {
    var all = allCourses();
    if (all.length === 0) {
      document.getElementById('grid').innerHTML = '<div class="empty"><div class="big">No courses yet.</div><div>Click "+ New course" to draft your first playbook.</div></div>';
      return;
    }
    document.getElementById('grid').innerHTML = '<div class="course-grid">' + all.map(function (c) {
      var p = progressFor(c);
      var progressHtml = '';
      if (p.total > 0) {
        progressHtml =
          '<div class="progress-bar"><div class="fill" style="width:' + p.pct + '%;"></div></div>' +
          '<div class="progress-pct">' + (p.completed ? '✓ Completed' : (p.done + ' / ' + p.total + ' lessons · ' + p.pct + '%')) + '</div>';
      }
      return '<div class="course-card" data-id="' + esc(c.id) + '">' +
        '<button class="edit-pencil" data-act="edit" title="Edit course">&#9998;</button>' +
        '<h3>' + esc(c.title || '(untitled)') + '</h3>' +
        '<div class="blurb">' + esc(c.blurb || '') + '</div>' +
        '<div class="stats">' +
          '<span><strong>' + (c.lessons || []).length + '</strong> lessons</span>' +
          '<span><strong>' + totalMinutes(c.lessons) + '</strong> min</span>' +
        '</div>' +
        progressHtml +
      '</div>';
    }).join('') + '</div>';
    document.querySelectorAll('.course-card').forEach(function (el) {
      el.addEventListener('click', function (e) {
        if (e.target.closest('[data-act=edit]')) {
          e.stopPropagation();
          openModal(el.dataset.id);
          return;
        }
        // Open the learner view
        location.href = 'training.html?id=' + encodeURIComponent(el.dataset.id);
      });
    });
  }

  function renderLessons(lessons) {
    var rows = (lessons || []).map(function (l, i) {
      return '<div class="lesson-row" data-i="' + i + '">' +
        '<input type="text" data-k="title" value="' + esc(l.title || '') + '" placeholder="Lesson title" />' +
        '<input type="text" data-k="videoUrl" value="' + esc(l.videoUrl || '') + '" placeholder="Video URL (optional)" />' +
        '<input type="number" data-k="durationMin" value="' + (l.durationMin || '') + '" min="0" placeholder="min" />' +
        '<button class="x" type="button" title="Remove">&times;</button>' +
      '</div>';
    }).join('');
    document.getElementById('lessons-rows').innerHTML = rows || '<p style="color:var(--muted); font-style:italic; font-size:12px; margin:0 0 4px;">No lessons yet.</p>';
    document.querySelectorAll('.lesson-row .x').forEach(function (b) {
      b.addEventListener('click', function () {
        var i = parseInt(b.closest('.lesson-row').dataset.i, 10);
        currentLessons.splice(i, 1);
        renderLessons(currentLessons);
      });
    });
  }

  var currentLessons = [];

  function openModal(id) {
    document.getElementById('m-id').value = id || '';
    var c = id ? getCourse(id) : null;
    document.getElementById('modalTitle').textContent = id ? 'Edit course' : 'New course';
    document.getElementById('m-delete').style.display = id ? '' : 'none';
    document.getElementById('m-title').value = (c && c.title) || '';
    document.getElementById('m-blurb').value = (c && c.blurb) || '';
    currentLessons = (c && Array.isArray(c.lessons)) ? c.lessons.slice() : [];
    renderLessons(currentLessons);
    document.getElementById('modalBg').classList.add('open');
    setTimeout(function () { document.getElementById('m-title').focus(); }, 50);
  }
  function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

  document.getElementById('newBtn').addEventListener('click', function () { openModal(null); });
  document.getElementById('m-cancel').addEventListener('click', closeModal);
  document.getElementById('modalBg').addEventListener('click', function (e) { if (e.target.id === 'modalBg') closeModal(); });

  document.getElementById('addLessonBtn').addEventListener('click', function () {
    currentLessons.push({ id: 'l' + uid(), title: '', videoUrl: '', durationMin: 0 });
    renderLessons(currentLessons);
  });

  document.getElementById('m-save').addEventListener('click', function () {
    var id = document.getElementById('m-id').value;
    var rec = id ? (getCourse(id) || {}) : {};
    rec.title = document.getElementById('m-title').value.trim() || '(untitled)';
    rec.blurb = document.getElementById('m-blurb').value.trim();
    // Read current lesson edits from the DOM (overrides currentLessons array order/values)
    rec.lessons = Array.prototype.map.call(document.querySelectorAll('.lesson-row'), function (row) {
      return {
        id: currentLessons[parseInt(row.dataset.i, 10)] ? currentLessons[parseInt(row.dataset.i, 10)].id : 'l' + uid(),
        title:       row.querySelector('[data-k=title]').value.trim(),
        videoUrl:    row.querySelector('[data-k=videoUrl]').value.trim(),
        durationMin: parseInt(row.querySelector('[data-k=durationMin]').value || '0', 10) || 0
      };
    }).filter(function (l) { return l.title || l.videoUrl; });
    saveCourse(rec);
    if (window.bccAudit) window.bccAudit(id ? 'course-update' : 'course-create', { key: rec.id, path: '/training.html' });
    if (window.bccNotifySaved) window.bccNotifySaved('Course saved.');
    closeModal();
    renderGrid();
  });
  document.getElementById('m-delete').addEventListener('click', function () {
    var id = document.getElementById('m-id').value; if (!id) return;
    if (!confirm('Delete this course?')) return;
    deleteCourse(id);
    if (window.bccAudit) window.bccAudit('course-update', { key: id, path: '/training.html', meta: { action: 'delete' } });
    closeModal();
    renderGrid();
  });

  function renderLearner(courseId) {
    var c = getCourse(courseId);
    var el = document.getElementById('learnerMode');
    if (!c) {
      el.innerHTML = '<div class="empty"><div class="big">Course not found.</div><div><a href="training.html" style="color:var(--gold-deep); text-decoration:none; font-weight:700;">Back to catalog</a></div></div>';
      return;
    }
    var p = progressFor(c);
    var enrollment = loadEnrollment(c.id);
    var lessons = c.lessons || [];

    var lessonsHtml = lessons.length === 0
      ? '<p style="color:var(--muted); font-style:italic; padding:20px 4px;">This course has no lessons yet.</p>'
      : lessons.map(function (l) {
          var done = !!(enrollment && enrollment.progress && enrollment.progress[l.id] === 'complete');
          var dur = l.durationMin ? l.durationMin + ' min' : 'duration unknown';
          var watch = l.videoUrl
            ? '<a class="watch" href="' + esc(l.videoUrl) + '" target="_blank" rel="noreferrer noopener">Open ↗</a>'
            : '';
          return '<div class="lesson-row-l' + (done ? ' done' : '') + '" data-lesson="' + esc(l.id) + '">' +
            '<div class="check" data-act="toggle"></div>' +
            '<div class="meta"><div class="title">' + esc(l.title || '(untitled lesson)') + '</div><div class="dur">' + esc(dur) + '</div></div>' +
            watch +
          '</div>';
        }).join('');

    el.innerHTML =
      '<section class="learner-head">' +
        '<a class="back" href="training.html">&larr; All courses</a>' +
        '<h1>' + esc(c.title || '(untitled)') + '</h1>' +
        (c.blurb ? '<div class="blurb">' + esc(c.blurb) + '</div>' : '') +
        '<div class="pct-row">' +
          (p.completed
            ? '<span class="completed-stamp">✓ Completed ' + (enrollment && enrollment.completedAt ? new Date(enrollment.completedAt).toLocaleDateString() : '') + '</span>'
            : '<div class="progress-bar"><div class="fill" style="width:' + p.pct + '%;"></div></div>' +
              '<span class="progress-pct">' + p.done + ' / ' + p.total + ' lessons · ' + p.pct + '%</span>') +
        '</div>' +
      '</section>' +
      '<div class="lesson-list">' + lessonsHtml + '</div>';

    el.querySelectorAll('.lesson-row-l').forEach(function (row) {
      row.addEventListener('click', function () {
        var lid = row.dataset.lesson;
        var nowDone = !row.classList.contains('done');
        saveEnrollment(c.id, function (e) {
          e.progress = e.progress || {};
          if (nowDone) e.progress[lid] = 'complete';
          else delete e.progress[lid];
          // Compute completion: all real lesson ids must be 'complete'
          var allComplete = lessons.length > 0 && lessons.every(function (l) { return e.progress[l.id] === 'complete'; });
          e.completedAt = allComplete ? (e.completedAt || new Date().toISOString()) : null;
        });
        if (window.bccAudit) window.bccAudit('enrollment-update', { key: enrollmentIdFor(c.id), path: '/training.html', meta: { courseId: c.id, lessonId: lid, action: nowDone ? 'complete' : 'reset' } });
        renderLearner(c.id);
      });
    });
  }

  function route() {
    var id = getParam('id');
    if (id) {
      showMode('learner');
      renderLearner(id);
    } else {
      showMode('catalog');
      renderGrid();
    }
  }

  function init() { route(); }
  window.addEventListener('bcc-data-ready', route);
  window.addEventListener('bcc-auth-ready', function () { document.body.dataset.didInit = '1'; init(); });
  setTimeout(function () { if (!document.body.dataset.didInit) { document.body.dataset.didInit = '1'; init(); } }, 600);
})();
</script>
</body>
</html>
