<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Access denied &middot; BCC Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; }
  body {
    font-family:'Inter', system-ui, -apple-system, Segoe UI, Arial, sans-serif;
    background: radial-gradient(circle at top, #2b2b2b 0%, #1a1a1a 80%);
    color:#f6f6f4;
    min-height:100vh; margin:0;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card {
    background:#1f1f1f; border:1px solid #2e2c27; border-radius:14px;
    padding:36px 30px; box-shadow:0 24px 60px rgba(0,0,0,0.45);
    max-width:540px; width:100%; text-align:center;
  }
  .card img { height:60px; margin-bottom:18px; }
  .card h1 {
    font-family:'Source Serif 4', Georgia, serif; color:#a8884a;
    font-size:26px; font-weight:700; letter-spacing:0.5px; margin:0 0 8px;
  }
  .card .lead { color:#e8e6e0; font-size:14px; line-height:1.6; margin:0 0 16px; }
  .card .sub  { color:#8a877e; font-size:13px; line-height:1.55; margin:0 0 14px; }
  .card .who {
    background:rgba(168,136,74,0.12); color:#d4b67a;
    border:1px solid rgba(168,136,74,0.35);
    font-family:ui-monospace, SFMono-Regular, monospace;
    font-size:13px; padding:8px 14px;
    border-radius:7px; display:inline-block; margin:0 0 18px;
    word-break:break-all;
  }
  .actions { display:flex; gap:8px; flex-direction:column; margin-top:8px; }
  .actions .btn {
    display:block; width:100%;
    padding:14px 18px; border-radius:9px;
    text-decoration:none; font-weight:700; font-size:14px; letter-spacing:0.3px;
    border:none; cursor:pointer; font-family:inherit;
  }
  .btn-primary { background:#c5a55a; color:#1a1a1a; }
  .btn-primary:hover, .btn-primary:active { background:#c2a05c; }
  .btn-ghost   { background:transparent; color:#e8e6e0; border:1px solid #3a3833; }
  .btn-ghost:hover, .btn-ghost:active { background:#2a2823; }
  .actions .small { font-size:12px; color:#8a877e; margin-top:14px; }
  .actions .small a { color:#a8884a; text-decoration:none; font-weight:600; }
  .actions .small a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="card" id="card">
  <img src="bcc-logo.png" alt="Blue Collar Coach" />
  <h1>Access denied</h1>
  <p class="lead" id="lead">You&rsquo;re signed in, but your account doesn&rsquo;t have permission for this page. Ask an administrator to grant you the right role.</p>
  <div id="who"></div>
  <div class="actions" id="actions">
    <a class="btn btn-primary" id="switchBtn" href="#">Sign in with a different account</a>
    <a class="btn btn-ghost"   id="signOutBtn" href="#">Sign out completely</a>
  </div>
  <div class="small">
    Still stuck? <a href="#" id="hardClearBtn">Hard-clear session + cookies</a>
  </div>
</div>

<script>
(function () {
  var p = new URLSearchParams(location.search);
  var reason = p.get('reason');
  var who    = p.get('who');

  if (reason === 'domain') {
    document.getElementById('lead').innerHTML =
      'BCC Connect is restricted to <strong>@bluecollarcoach.us</strong> accounts. ' +
      'If you have multiple Microsoft accounts on this device, tap the button below and pick your Blue Collar Coach one.';
  }
  if (who) {
    document.getElementById('who').innerHTML =
      '<div class="who">Signed in as: ' + who.replace(/[<>&"']/g, '') + '</div>';
  }

  // Microsoft's "logout from this device" endpoint. We chain SWA logout into
  // Microsoft logout so the user is signed out of BOTH the SWA session AND the
  // Microsoft federated session — otherwise Microsoft's still-active token
  // silently re-signs them into the wrong account and they bounce right back.
  var origin = location.origin;
  var msLogout = 'https://login.microsoftonline.com/common/oauth2/v2.0/logout' +
                 '?post_logout_redirect_uri=' + encodeURIComponent(origin + '/index.html');
  var msLogoutThenPick =
    'https://login.microsoftonline.com/common/oauth2/v2.0/logout' +
    '?post_logout_redirect_uri=' + encodeURIComponent(
      origin + '/.auth/login/aad?prompt=select_account&domain_hint=bluecollarcoach.us' +
      '&post_login_redirect_uri=' + encodeURIComponent(origin + '/')
    );

  // "Sign in with a different account" — full Microsoft logout, then bounce
  // straight into the account picker. This is the only reliable way to switch
  // accounts on a device that has multiple Microsoft tokens cached.
  document.getElementById('switchBtn').onclick = function (e) {
    e.preventDefault();
    location.href = '/.auth/logout?post_logout_redirect_uri=' + encodeURIComponent(msLogoutThenPick);
  };

  // "Sign out completely" — SWA + Microsoft sign-out, land back on landing.
  document.getElementById('signOutBtn').onclick = function (e) {
    e.preventDefault();
    location.href = '/.auth/logout?post_logout_redirect_uri=' + encodeURIComponent(msLogout);
  };

  // "Hard-clear" — also wipes our localStorage / sessionStorage on the way out
  // (in case the wrong account's bcc-* keys are still cached locally).
  document.getElementById('hardClearBtn').onclick = function (e) {
    e.preventDefault();
    try {
      Object.keys(localStorage).forEach(function (k) {
        if (k.indexOf('bcc-') === 0) localStorage.removeItem(k);
      });
      sessionStorage.clear();
    } catch (err) {}
    location.href = '/.auth/logout?post_logout_redirect_uri=' + encodeURIComponent(msLogout);
  };
})();
</script>
</body>
</html>
